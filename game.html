function lvCFG()    { return LEVELS[currentLevel]; }
function lvFS()     { return lvCFG().fs; }
function lvLSPACE() { return lvCFG().lspace; }
function lvGOLD()   { return lvCFG().gold; }

// ─── GLITCH ───────────────────────────────────────
const GLITCH_CHARS = '!@#$%^&*~<>[]{}?|01_';
function glitchText(text, seed){
  let out = '';
  for(let i=0;i<text.length;i++) out += GLITCH_CHARS[(Math.floor(seed)+i*7)%GLITCH_CHARS.length];
  return out;
}

// ─── CONSTANTS ────────────────────────────────────

// ─── PASSAGE PARSING ──────────────────────────────
// Both computePositions and flatPassageTokens must process lines identically.
// Passage format:
//   \n   = line separator (hard break in stream/verse, paragraph continuation in prose)
//   \n\n = blank line (paragraph/stanza gap)
//   \t   = line-start indent marker (stream mode only)

function flatPassageTokens(passage){
  const tokens = [];
  for(const rawLine of passage.split('\n')){
    if(rawLine.trim()==='') continue;
    for(const t of rawLine.trim().split(/\s+/)) if(t) tokens.push(t);
  }
  return tokens;
}

function computePositions(cfg){
  const { passage, layoutMode, fs, lspace, margin } = cfg;
  ctx.font = `${fs}px ${FONT}`;
  const spW = ctx.measureText(' ').width;
  const positions = []; // { hx, hy, tw } per token, parallel to flatPassageTokens
  const rawLines  = passage.split('\n');
  let lineN = 0; // fractional line counter

  if(layoutMode === 'prose'){
    let lx = 0;
    const maxW = W - margin * 2;
    for(const rawLine of rawLines){
      if(rawLine.trim()===''){
        if(lx > 0){ lineN++; lx = 0; } // snap to line start
        lineN += 0.55;                   // paragraph gap
        continue;
      }
      for(const text of rawLine.trim().split(/\s+/).filter(Boolean)){
        const tw = ctx.measureText(text).width;
        if(lx + tw > maxW && lx > 0){ lineN++; lx = 0; }
        positions.push({ hx: margin + lx + tw/2, hy: TOP + lineN * lspace, tw });
        lx += tw + spW;
      }
    }

  } else if(layoutMode === 'stream'){
    // Narrow left column; \t-prefixed lines are indented
    const colW    = Math.min(W * 0.62, 310);
    for(const rawLine of rawLines){
      if(rawLine.trim()===''){
        lineN += 0.6; // section gap
        continue;
      }
      const isInd  = rawLine.startsWith('\t');
      const indent = isInd ? 22 : 0;
      const lm     = margin + indent;
      const avail  = colW - indent;
      let lx = 0;
      for(const text of rawLine.trim().split(/\s+/).filter(Boolean)){
        const tw = ctx.measureText(text).width;
        if(lx + tw > avail && lx > 0){ lineN++; lx = 0; }
        positions.push({ hx: lm + lx + tw/2, hy: TOP + lineN * lspace, tw });
        lx += tw + spW;
      }
      lineN++;
    }

  } else if(layoutMode === 'verse'){
    // Each non-blank line centered
    for(const rawLine of rawLines){
      if(rawLine.trim()===''){
        lineN += 0.8; // stanza gap
        continue;
      }
      const tokens = rawLine.trim().split(/\s+/).filter(Boolean);
      const totalW = tokens.reduce((s,t) => s + ctx.measureText(t).width + spW, -spW);
      let lx = Math.max(margin, (W - totalW) / 2);
      for(const text of tokens){
        const tw = ctx.measureText(text).width;
        positions.push({ hx: lx + tw/2, hy: TOP + lineN * lspace, tw });
        lx += tw + spW;
      }
      lineN++;
    }
  }

  return positions;
}

// ─── LAYOUT ───────────────────────────────────────
function layout(){
  const cfg      = lvCFG();
  const positions= computePositions(cfg);
  const tokens   = flatPassageTokens(cfg.passage);
  const usedGold = new Set(), usedTrap = new Set();
  words = [];

  for(let i=0; i<tokens.length; i++){
    const text = tokens[i];
    const { hx, hy, tw } = positions[i] || { hx:0, hy:0, tw:10 };
    let goldIndex=-1, trapWord=false;
    const gi = lvGOLD().findIndex(g=>g.text===text);
    if(gi>=0 && !usedGold.has(gi)){ goldIndex=gi; usedGold.add(gi); }
    const ti = cfg.trapKeys.indexOf(text);
    if(ti>=0 && !usedTrap.has(ti) && goldIndex<0){ trapWord=true; usedTrap.add(ti); }
    words.push({
      text, tw, hx, hy, ohx:hx, ohy:hy,
      x:hx, y:hy, vx:0, vy:0,
      goldIndex, trapWord,
      goldAlpha:0, revealTimer:0, goldMissed:false,
      trapAlpha:0, trapTimer:0, trapTriggered:false,
      scrambleTimer:0, scrambleSeed:Math.random()*100,
      corrupted:false,
      waveOff:Math.random()*Math.PI*2, waveFreq:0.35+Math.random()*0.25,
    });
  }
  totalPassageH = Math.max(...words.map(w=>w.hy)) + lvLSPACE()*3;
}

function repositionHomes(){
  const cfg      = lvCFG();
  const positions= computePositions(cfg);
  for(let i=0; i<words.length && i<positions.length; i++){
    const { hx, hy, tw } = positions[i];
    words[i].hx=hx; words[i].hy=hy; words[i].ohx=hx; words[i].ohy=hy; words[i].tw=tw;
  }
  totalPassageH = Math.max(...words.map(w=>w.hy)) + lvLSPACE()*3;
}

// ─── CANVAS RESIZE ────────────────────────────────
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
let W=0, H=0;
function resize(){
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
  if(words.length) repositionHomes();
}
window.addEventListener('resize', resize);

// ─── SCORE DOM ────────────────────────────────────
function updateScore(){
  const lv   = lvCFG();
  const mins = Math.floor(timeLeft/60);
  const secs = Math.floor(timeLeft%60);
  document.getElementById('sc-level').textContent = lv.label;
  document.getElementById('sc-timer').textContent = `${mins}:${secs.toString().padStart(2,'0')}`;
  document.getElementById('sc-found').textContent = `${found.size} / ${lvGOLD().length}`;
}

// ─── TRAP TRIGGER ─────────────────────────────────
function triggerTrap(w){
  w.trapTriggered = true; trapHits++;
  bursts.push({ x:w.x, screenY:w.y-scrollY, t:1.0, rgb:[180,40,40], big:true });
  queueToast({ tag:'// 干扰', word:'ERROR', color:[180,40,40],
               brief:'信号污染——附近的词被打乱了。', dur:2500 });
  for(const ow of words){
    if(ow===w||ow.trapTriggered) continue;
    const d = Math.hypot(ow.x-w.x, ow.y-w.y);
    if(d < BLAST_R){
      const s = 1-d/BLAST_R;
      ow.scrambleTimer = SCRAMBLE_T*(0.6+s*0.7); ow.scrambleSeed=Math.random()*100;
      const ang=Math.atan2(ow.y-w.y, ow.x-w.x);
      ow.vx+=Math.cos(ang)*s*18; ow.vy+=Math.sin(ang)*s*18;
      if(ow.goldIndex>=0&&!found.has(ow.goldIndex)&&!ow.goldMissed){
        ow.corrupted=true; ow.goldAlpha=0; ow.revealTimer=0;
      }
    }
  }
}

// ─── UPDATE ───────────────────────────────────────
function update(dt){
  if(phase!=='explore') return;
  pulseT += dt*0.018;
  const sec = dt*16.67/1000;

  timeLeft = Math.max(0, timeLeft-sec);
  updateScore();
  if(timeLeft<=0){ checkEnd(); return; }

  const cfg = lvCFG();
  const hasFingers = Object.keys(pointers).length>0;
  const targetVel  = hasFingers ? cfg.scrollSlow : cfg.scrollNorm;
  scrollVel += (targetVel-scrollVel)*0.05;
  scrollY   += scrollVel*sec;

  const pts = Object.values(pointers);

  for(const w of words){
    const approxSy = w.hy-scrollY;

    if(w.goldIndex>=0 && !found.has(w.goldIndex) && !w.goldMissed && approxSy < -80){
      w.goldMissed=true; missed++;
      missedFx.push({ x:w.hx, t:1.5, label:lvGOLD()[w.goldIndex].text.toUpperCase() });
      updateScore();
    }

    if(!w.trapWord && w.goldIndex<0 && approxSy < -(lvLSPACE()*2)){
      w.hy+=totalPassageH; w.y=w.hy; w.x=w.hx; w.vx=0; w.vy=0; continue;
    }

    if(approxSy < -200 || approxSy > H+150){
      w.x=w.hx; w.y=w.hy; w.vx=0; w.vy=0; continue;
    }

    if(w.scrambleTimer>0){
      w.scrambleTimer=Math.max(0, w.scrambleTimer-sec);
      if(w.scrambleTimer<=0) w.corrupted=false;
    }

    w.vx += Math.sin(pulseT*w.waveFreq+w.waveOff)*0.032;
    w.vy += Math.cos(pulseT*w.waveFreq*0.8+w.waveOff*1.2)*0.032;
    w.vx += (w.hx-w.x)*SPRING; w.vy += (w.hy-w.y)*SPRING;

    for(const p of pts){
      const dx=w.x-p.x, dy=w.y-(p.y+scrollY);
      const d=Math.sqrt(dx*dx+dy*dy);
      if(d<REPEL_R&&d>0.5){ const f=(1-d/REPEL_R)*REPEL_F; w.vx+=dx/d*f; w.vy+=dy/d*f; }
    }
    w.vx*=DAMP; w.vy*=DAMP; w.x+=w.vx*dt; w.y+=w.vy*dt;

    if(w.goldIndex>=0&&!found.has(w.goldIndex)&&!w.goldMissed&&!w.corrupted){
      let bonus=0;
      for(const p of pts){ const d=Math.hypot(p.x-w.hx,p.y+scrollY-w.hy); if(d<110) bonus=Math.max(bonus,1-d/110); }
      w.goldAlpha+=(bonus-w.goldAlpha)*0.10;
      if(w.goldAlpha>0.55){ w.revealTimer+=sec; if(w.revealTimer>=1.0) collectWord(w); }
      else w.revealTimer=Math.max(0, w.revealTimer-sec*1.5);
    }

    if(w.trapWord&&!w.trapTriggered){
      let bonus=0;
      for(const p of pts){ const d=Math.hypot(p.x-w.hx,p.y+scrollY-w.hy); if(d<100) bonus=Math.max(bonus,1-d/100); }
      w.trapAlpha+=(bonus-w.trapAlpha)*0.12;
      if(w.trapAlpha>0.55){ w.trapTimer+=sec; if(w.trapTimer>=0.4) triggerTrap(w); }
      else w.trapTimer=Math.max(0, w.trapTimer-sec*2.0);
    }
  }

  for(const b of bursts)   b.t=Math.max(0,b.t-sec*(b.big?1.4:1.8));
  for(const e of missedFx) e.t=Math.max(0,e.t-sec*0.9);
  bursts  =bursts.filter(b=>b.t>0);
  missedFx=missedFx.filter(e=>e.t>0);

  if(found.size===lvGOLD().length) checkEnd();
}

// ─── COLLECT ──────────────────────────────────────
function collectWord(w){
  const gi=w.goldIndex; if(found.has(gi)) return;
  found.add(gi);
  const g=lvGOLD()[gi]; updateScore();
  bursts.push({ x:w.x, screenY:w.y-scrollY, t:1.0, rgb:g.rgb });
  queueToast({ tag:'// 发现', word:g.text.toUpperCase(), color:g.rgb,
               brief:`${g.cn}  —  ${g.brief}`, dur:4000 });
  const gIdxs=lvGOLD().reduce((a,_,i)=>lvGOLD()[i].group===g.group?[...a,i]:a,[]);
  if(gIdxs.every(i=>found.has(i))&&!combosFound.has(g.group)){
    combosFound.add(g.group);
    queueToast({ tag:'// 组合', word:lvCFG().combos[g.group].title, color:g.rgb,
                 brief:lvCFG().combos[g.group].brief, dur:5000 });
  }
  if(found.size===lvGOLD().length) checkEnd();
}

function checkEnd(){
  if(phase==='ending') return;
  phase='ending'; setTimeout(showEnd,800);
}

// ─── TOAST ────────────────────────────────────────
function queueToast(data){ toastQueue.push(data); if(!toastTimer) showNextToast(); }
function showNextToast(){
  if(!toastQueue.length){ toastTimer=null; return; }
  const d=toastQueue.shift(); const [r,g,b]=d.color;
  document.getElementById('t-tag').textContent  =d.tag;
  document.getElementById('t-word').textContent =d.word;
  document.getElementById('t-word').style.color =`rgba(${r},${g},${b},0.9)`;
  document.getElementById('t-brief').textContent=d.brief;
  document.getElementById('toast').classList.add('show');
  toastTimer=setTimeout(()=>{
    document.getElementById('toast').classList.remove('show');
    toastTimer=setTimeout(showNextToast,280);
  },d.dur);
}

// ─── END / NEXT LEVEL ─────────────────────────────
function showEnd(){
  phase='idle';
  const lv=lvCFG(), gold=lvGOLD(), total=found.size;
  const stars=total>=gold.length?3:total>=(gold.length*0.625|0)?2:total>=3?1:0;
  const isLast=currentLevel===LEVELS.length-1;
  document.getElementById('e-title').textContent=
    total===gold.length?'COMPLETE':total>=(gold.length>>1)?'PARTIAL':'SIGNAL LOST';
  document.getElementById('e-lv').textContent=`${lv.label} · ${lv.name} · ${lv.desc}`;
  document.getElementById('e-rows').innerHTML=gold.map((g,i)=>{
    const st=found.has(i)?'✓':(words.find(w=>w.goldIndex===i)?.goldMissed?'✗':'·');
    const dim=st==='·'?',0.30':',.88';
    return `<span style="color:rgba(${g.rgb[0]},${g.rgb[1]},${g.rgb[2]}${dim})">${g.text}&nbsp;${st}</span>`;
  }).join('');
  document.getElementById('e-score').innerHTML=
    `${'★'.repeat(stars)+'☆'.repeat(3-stars)}&nbsp;&nbsp;${total}/${gold.length} 词&nbsp;&nbsp;${missed} 丢失&nbsp;&nbsp;${trapHits} 被炸<br>`+
    (combosFound.size>0?`组合解锁 ${combosFound.size}/3`:'无组合');
  document.getElementById('e-next').style.display=isLast?'none':'';
  document.getElementById('e-retry').textContent=isLast?'重新开始':'再来一次';
  if(isLast) document.getElementById('e-retry').setAttribute('onpointerdown','currentLevel=0;startGame()');
  else       document.getElementById('e-retry').setAttribute('onpointerdown','startGame()');
  document.getElementById('end-ov').classList.remove('gone');
}

function nextLevel(){ if(currentLevel<LEVELS.length-1){ currentLevel++; startGame(); } }

// ─── DRAW ─────────────────────────────────────────
function draw(){
  ctx.fillStyle='#f5f0e6'; ctx.fillRect(0,0,W,H);
  const fs=lvFS(), gold=lvGOLD();
  ctx.font=`${fs}px ${FONT}`; ctx.textAlign='center'; ctx.textBaseline='middle';

  const dangerBars=[];

  for(const w of words){
    const sy=w.y-scrollY;
    if(sy<-40||sy>H+40) continue;

    if(w.scrambleTimer>0){
      const fade=w.scrambleTimer<0.6?w.scrambleTimer/0.6:1;
      const chars=glitchText(w.text, pulseT*10+w.scrambleSeed);
      const jx=(Math.random()-0.5)*4, jy=(Math.random()-0.5)*3;
      ctx.fillStyle=`rgba(${TRAP_RGB[0]},${TRAP_RGB[1]},${TRAP_RGB[2]},${(fade*0.60).toFixed(2)})`;
      ctx.fillText(chars,w.x+jx,sy+jy); continue;
    }

    const isGold  =w.goldIndex>=0;
    const isFound =isGold&&found.has(w.goldIndex);
    const isMissed=isGold&&w.goldMissed;
    const isActive=isGold&&!isFound&&!isMissed;
    const isTrap  =w.trapWord&&!w.trapTriggered;

    if(isFound){
      const [r,g,b]=gold[w.goldIndex].rgb;
      ctx.fillStyle=`rgba(${r},${g},${b},0.82)`; ctx.fillText(w.text,w.x,sy); continue;
    }
    if(isMissed){
      ctx.fillStyle=`rgba(${INK[0]},${INK[1]},${INK[2]},0.14)`; ctx.fillText(w.text,w.x,sy); continue;
    }
    if(w.trapTriggered) continue;

    if(isActive){
      const [gr,gg,gb]=gold[w.goldIndex].rgb, a=w.goldAlpha;
      const dr=Math.round(INK[0]+(gr-INK[0])*a), dg=Math.round(INK[1]+(gg-INK[1])*a), db=Math.round(INK[2]+(gb-INK[2])*a);
      if(a>0.55){
        const pulse=Math.sin(pulseT*6)*0.12+0.88;
        ctx.shadowColor=`rgba(${gr},${gg},${gb},0.28)`; ctx.shadowBlur=8+pulse*4;
        ctx.fillStyle=`rgba(${dr},${dg},${db},0.92)`; ctx.fillText(w.text,w.x,sy);
        ctx.shadowBlur=0; ctx.shadowColor='transparent';
        const prog=Math.min(1,w.revealTimer/1.0);
        if(prog>0){
          ctx.beginPath(); ctx.arc(w.x,sy,w.tw/2+8,-Math.PI/2,-Math.PI/2+prog*Math.PI*2);
          ctx.strokeStyle=`rgba(${gr},${gg},${gb},0.50)`; ctx.lineWidth=1.5; ctx.stroke();
        }
      } else {
        ctx.fillStyle=`rgba(${dr},${dg},${db},0.88)`; ctx.fillText(w.text,w.x,sy);
      }
      if(sy>0&&sy<90) dangerBars.push({ rgb:[gr,gg,gb], danger:1-sy/90 });
      continue;
    }

    if(isTrap){
      const a=w.trapAlpha;
      const dr=Math.round(INK[0]+(TRAP_RGB[0]-INK[0])*a), dg=Math.round(INK[1]+(TRAP_RGB[1]-INK[1])*a), db=Math.round(INK[2]+(TRAP_RGB[2]-INK[2])*a);
      if(a>0.45){
        const flicker=Math.sin(pulseT*35)*0.22+0.78;
        ctx.fillStyle=`rgba(${dr},${dg},${db},${(0.90*flicker).toFixed(2)})`;
        const prog=Math.min(1,w.trapTimer/0.4);
        if(prog>0){
          ctx.beginPath(); ctx.arc(w.x,sy,w.tw/2+8,-Math.PI/2,-Math.PI/2+prog*Math.PI*2);
          ctx.strokeStyle=`rgba(${TRAP_RGB[0]},${TRAP_RGB[1]},${TRAP_RGB[2]},0.60)`; ctx.lineWidth=1.5; ctx.stroke();
        }
      } else {
        ctx.fillStyle=`rgba(${dr},${dg},${db},0.88)`;
      }
      ctx.fillText(w.text,w.x,sy);
      if(sy>0&&sy<90) dangerBars.push({ rgb:TRAP_RGB, danger:1-sy/90 });
      continue;
    }

    ctx.fillStyle=`rgba(${INK[0]},${INK[1]},${INK[2]},0.88)`;
    ctx.fillText(w.text,w.x,sy);
  }

  for(const b of bursts){
    const [r,g,bb]=b.rgb;
    if(b.big){
      const r1=(1-b.t)*90, r2=(1-b.t)*BLAST_R;
      ctx.beginPath(); ctx.arc(b.x,b.screenY,r1,0,Math.PI*2);
      ctx.strokeStyle=`rgba(${r},${g},${bb},${(b.t*0.70).toFixed(2)})`; ctx.lineWidth=3; ctx.stroke();
      ctx.beginPath(); ctx.arc(b.x,b.screenY,r2,0,Math.PI*2);
      ctx.strokeStyle=`rgba(${r},${g},${bb},${(b.t*0.30).toFixed(2)})`; ctx.lineWidth=1; ctx.stroke();
    } else {
      const radius=(1-b.t)*55;
      ctx.beginPath(); ctx.arc(b.x,b.screenY,radius,0,Math.PI*2);
      ctx.strokeStyle=`rgba(${r},${g},${bb},${(b.t*0.55).toFixed(2)})`; ctx.lineWidth=2; ctx.stroke();
    }
  }

  ctx.textAlign='left'; ctx.textBaseline='top'; ctx.font=`11px ${FONT}`;
  for(const e of missedFx){
    ctx.fillStyle=`rgba(160,30,30,${(e.t*0.58).toFixed(2)})`;
    ctx.fillText(`↑ ${e.label}`, Math.max(8,Math.min(W-80,e.x-20)),10);
  }

  const tg=ctx.createLinearGradient(0,0,0,92);
  tg.addColorStop(0,'#f5f0e6'); tg.addColorStop(1,'rgba(245,240,230,0)');
  ctx.fillStyle=tg; ctx.fillRect(0,0,W,92);
  const bg=ctx.createLinearGradient(0,H-80,0,H);
  bg.addColorStop(0,'rgba(245,240,230,0)'); bg.addColorStop(1,'#f5f0e6');
  ctx.fillStyle=bg; ctx.fillRect(0,H-80,W,80);

  for(const db of dangerBars){
    const [r,g,b]=db.rgb;
    ctx.fillStyle=`rgba(${r},${g},${b},${(db.danger*0.50).toFixed(2)})`;
    ctx.fillRect(0,50,W*db.danger,3);
  }
}

// ─── INPUT ────────────────────────────────────────
function getXY(e){ const r=canvas.getBoundingClientRect(); return {x:e.clientX-r.left,y:e.clientY-r.top}; }
canvas.addEventListener('pointerdown',  e=>{ canvas.setPointerCapture(e.pointerId); pointers[e.pointerId]=getXY(e); });
canvas.addEventListener('pointermove',  e=>{ pointers[e.pointerId]=getXY(e); });
canvas.addEventListener('pointerup',    e=>{ delete pointers[e.pointerId]; });
canvas.addEventListener('pointercancel',e=>{ delete pointers[e.pointerId]; });

// ─── START ────────────────────────────────────────
function startGame(){
  document.getElementById('start').classList.add('gone');
  document.getElementById('end-ov').classList.add('gone');
  document.getElementById('toast').classList.remove('show');
  if(toastTimer){ clearTimeout(toastTimer); toastTimer=null; }
  toastQueue=[]; bursts=[]; missedFx=[];
  found=new Set(); combosFound=new Set(); missed=0; trapHits=0;
  scrollY=0; scrollVel=0; pulseT=0;
  timeLeft=lvCFG().time; phase='idle';
  updateScore();
  resize(); layout();
  phase='explore';
}

// ─── LOOP ─────────────────────────────────────────
let lastT=0;
function loop(t){
  const dt=Math.min((t-lastT)/16.67,3); lastT=t;
  update(dt); draw();
  requestAnimationFrame(loop);
}
resize(); layout();
requestAnimationFrame(loop);
</script>
