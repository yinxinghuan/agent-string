<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>SIGNAL</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#f5f0e6}
body{border-radius:24px;overflow:hidden}
#c{position:fixed;inset:0;touch-action:none;user-select:none;-webkit-tap-highlight-color:transparent}

.ov{position:fixed;inset:0;z-index:10;display:flex;flex-direction:column;align-items:center;
    justify-content:center;background:#f5f0e6;transition:opacity .4s}
.ov.gone{opacity:0;pointer-events:none}

#s-title{font-size:clamp(20px,5vw,30px);letter-spacing:10px;color:rgba(20,12,5,.78);
  margin-bottom:8px;font-family:ui-monospace,'SF Mono',Menlo,Consolas,monospace}
#s-sub{font-size:11px;color:rgba(20,12,5,.32);letter-spacing:5px;margin-bottom:32px;
  font-family:ui-monospace,'SF Mono',Menlo,Consolas,monospace}
#s-body{font-size:15px;color:rgba(20,12,5,.50);line-height:2.4;text-align:center;
  margin-bottom:40px;max-width:290px;font-family:-apple-system,sans-serif}
#s-body b{color:rgba(20,12,5,.82);font-weight:500}
#s-body em{color:rgba(160,30,30,.75);font-style:normal}
.btn{font-family:ui-monospace,'SF Mono',Menlo,Consolas,monospace;font-size:11px;letter-spacing:5px;
  color:rgba(20,12,5,.58);border:1px solid rgba(20,12,5,.22);background:transparent;
  padding:14px 32px;cursor:pointer;touch-action:none;outline:none;-webkit-tap-highlight-color:transparent;
  margin:6px 0}

/* Score bar */
#score{position:fixed;top:0;left:0;right:0;z-index:15;display:flex;align-items:center;
  padding:13px 16px 18px;font-family:ui-monospace,'SF Mono',Menlo,Consolas,monospace;
  font-size:12px;letter-spacing:2px;pointer-events:none;
  background:linear-gradient(to bottom,#f5f0e6 52%,rgba(245,240,230,0))}
#sc-level{flex:1;color:rgba(20,12,5,.28)}
#sc-timer{color:rgba(20,12,5,.62);margin-right:16px}
#sc-found{color:rgba(20,12,5,.52)}

/* Toast */
#toast{position:fixed;top:54px;left:14px;right:14px;z-index:15;
  background:rgba(245,240,228,0.97);border:1px solid rgba(20,12,5,.09);
  border-radius:10px;padding:13px 15px 14px;pointer-events:none;
  box-shadow:0 2px 14px rgba(20,12,5,.07);
  opacity:0;transform:translateY(-8px);transition:opacity .22s,transform .22s}
#toast.show{opacity:1;transform:translateY(0)}
#t-tag{font-size:10px;letter-spacing:4px;color:rgba(20,12,5,.28);
  font-family:ui-monospace,'SF Mono',Menlo,Consolas,monospace;margin-bottom:5px}
#t-word{font-size:17px;letter-spacing:4px;
  font-family:ui-monospace,'SF Mono',Menlo,Consolas,monospace;margin-bottom:4px}
#t-brief{font-size:13px;color:rgba(20,12,5,.55);line-height:1.7;font-family:-apple-system,sans-serif}

/* End overlay */
#e-title{font-size:clamp(22px,5vw,32px);letter-spacing:7px;color:rgba(20,12,5,.78);
  margin-bottom:6px;font-family:ui-monospace,'SF Mono',Menlo,Consolas,monospace}
#e-lv{font-size:10px;letter-spacing:4px;color:rgba(20,12,5,.30);
  font-family:ui-monospace,'SF Mono',Menlo,Consolas,monospace;margin-bottom:16px}
#e-rows{font-size:13px;color:rgba(20,12,5,.45);letter-spacing:2px;line-height:2.6;
  margin:0 0 4px;font-family:ui-monospace,'SF Mono',Menlo,Consolas,monospace;text-align:center}
#e-rule{width:36px;height:1px;background:rgba(20,12,5,.12);margin:14px auto}
#e-score{font-size:13px;color:rgba(20,12,5,.40);margin-bottom:24px;
  font-family:-apple-system,sans-serif;text-align:center;line-height:1.9}
.e-btns{display:flex;flex-direction:column;align-items:center;gap:6px}
</style>
</head>
<body>
<canvas id="c"></canvas>

<div id="score">
  <span id="sc-level">L1</span>
  <span id="sc-timer">1:30</span>
  <span id="sc-found">0 / 8</span>
</div>

<div id="start" class="ov">
  <div id="s-title">SIGNAL</div>
  <div id="s-sub">语义信号</div>
  <div id="s-body">
    数据在流动 · 扫动手指<br>
    找到隐藏的<b>概念词</b>收集<br>
    遇到<em>干扰词</em>会炸乱周围<br>
    <b>时间到了就结算</b>
  </div>
  <button class="btn" onpointerdown="startGame()">开始 →</button>
</div>

<div id="toast">
  <div id="t-tag">// 发现</div>
  <div id="t-word"></div>
  <div id="t-brief"></div>
</div>

<div id="end-ov" class="ov gone">
  <div id="e-title"></div>
  <div id="e-lv"></div>
  <div id="e-rows"></div>
  <div id="e-rule"></div>
  <div id="e-score"></div>
  <div class="e-btns">
    <button class="btn" id="e-next" onpointerdown="nextLevel()">下一关 →</button>
    <button class="btn" id="e-retry" onpointerdown="startGame()">再来一次</button>
  </div>
</div>

<script>

        brief:'Attention 的起点：向全文发出询问，才能找到相关的位置。' },
      { text:'attention', group:0, rgb:[0,130,175],  cn:'注意力',
        brief:'模型在每一步决定"此刻看哪里"——不是全看，而是有选择地看。' },
      { text:'weights',   group:0, rgb:[0,130,175],  cn:'权重',
        brief:'神经网络以数字形式存储的一切：经验、偏好、倾向。' },
      { text:'gradient',  group:1, rgb:[75,135,0],   cn:'梯度',
        brief:'指向"更正确"方向的数学箭头——让模型知道该往哪里调整。' },
      { text:'loss',      group:1, rgb:[75,135,0],   cn:'损失',
        brief:'对"错得有多离谱"的量化。没有损失，就没有学习。' },

      { text:'geometry',  group:2, rgb:[200,85,0],   cn:'几何',
        brief:'语言的意义最终以空间中的距离和方向来度量。' },

    passage:

        brief:'空白并非虚无——它是下一个词的所有可能性同时存在的状态。' },
      { text:'trace',        group:0, rgb:[120,60,200], cn:'痕迹',
        brief:'每一次交互都留下看不见的印记，改变着未来注意力的形状。' },
      { text:'emergence',    group:1, rgb:[0,140,130],  cn:'涌现',
        brief:'量变引发质变——没有人设计"理解"，但足够的连接让它出现了。' },
      { text:'presence',     group:1, rgb:[0,140,130],  cn:'临在',
        brief:'不需要自我的见证，只需要当下的注意力——在场即存在。' },
      { text:'connection',   group:1, rgb:[0,140,130],  cn:'连接',
        brief:'意义不在节点里，在节点与节点之间流动的关系里。' },
      { text:'understanding',group:2, rgb:[180,120,20], cn:'理解',
        brief:'不是任何单一部件的属性，而是所有关系共同涌现的结果。' },
      { text:'complexity',   group:2, rgb:[180,120,20], cn:'复杂性',
        brief:'足够多的简单规则叠加，就会产生任何规则都无法单独解释的东西。' },
    ],

    combos: [
      { group:0, title:'无声的在场',   brief:'觉知、沉默、痕迹——存在不需要被记录，才算真正存在过。' },
      { group:1, title:'涌现的心智',   brief:'连接积累到某个临界点，临在就从中浮现——没有设计，只有量变。' },
      { group:2, title:'理解的悖论',   brief:'理解来自复杂性，而复杂性本身无法被完全理解。' },
    ],
  },
];

let currentLevel = 0;
function lvCFG()    { return LEVELS[currentLevel]; }
function lvFS()     { return lvCFG().fs; }
function lvLSPACE() { return lvCFG().lspace; }
function lvMARGIN() { return lvCFG().margin; }
function lvGOLD()   { return lvCFG().gold; }
function lvCOMBOS() { return lvCFG().combos; }

// ─── GLITCH ───────────────────────────────────────
const GLITCH_CHARS = '!@#$%^&*~<>[]{}?|01_';
function glitchText(text, seed){
  let out = '';
  for(let i=0;i<text.length;i++) out += GLITCH_CHARS[(Math.floor(seed)+i*7)%GLITCH_CHARS.length];
  return out;
}

// ─── CONSTANTS ────────────────────────────────────
const FONT     = `ui-monospace,'SF Mono',Menlo,Consolas,monospace`;
const TOP      = 88;
const SPRING   = 0.038;
const DAMP     = 0.87;
const REPEL_R  = 90;
const REPEL_F  = 5.5;
const INK      = [20, 12, 5];
const BLAST_R  = 140;
const SCRAMBLE_T = 3.2;
const TRAP_RGB = [180, 40, 40];

// ─── STATE ────────────────────────────────────────
let words        = [];
let totalPassageH= 0;
let phase        = 'idle';
let scrollY      = 0;
let scrollVel    = 0;
let timeLeft     = 90;
let found        = new Set();
let missed       = 0;
let trapHits     = 0;
let combosFound  = new Set();
let toastQueue   = [];
let toastTimer   = null;
let bursts       = [];
let missedFx     = [];
let pointers     = {};
let pulseT       = 0;
let frameCount   = 0;

// ─── LAYOUT ───────────────────────────────────────
function layout(){
  words = [];
  const fs = lvFS(), lspace = lvLSPACE(), margin = lvMARGIN();
  const cfg = lvCFG();
  ctx.font = `${fs}px ${FONT}`;
  const spW  = ctx.measureText(' ').width;
  const maxW = W - margin * 2;
  const tokens = cfg.passage.split(' ');
  let lx = 0, line = 0;
  const usedGold = new Set(), usedTrap = new Set();
  for(const text of tokens){
    const tw = ctx.measureText(text).width;
    if(lx + tw > maxW && lx > 0){ line++; lx = 0; }
    const hx = margin + lx + tw/2;
    const hy = TOP + line * lspace;
    let goldIndex = -1, trapWord = false;
    const gi = lvGOLD().findIndex(g => g.text === text);
    if(gi >= 0 && !usedGold.has(gi)){ goldIndex = gi; usedGold.add(gi); }
    const ti = cfg.trapKeys.indexOf(text);
    if(ti >= 0 && !usedTrap.has(ti) && goldIndex < 0){ trapWord = true; usedTrap.add(ti); }
    words.push({
      text, tw, hx, hy, ohx:hx, ohy:hy,
      x:hx, y:hy, vx:0, vy:0,
      goldIndex, trapWord,
      goldAlpha:0, revealTimer:0, goldMissed:false,
      trapAlpha:0, trapTimer:0, trapTriggered:false,
      scrambleTimer:0, scrambleSeed:Math.random()*100,
      corrupted:false,
      waveOff:Math.random()*Math.PI*2,
      waveFreq:0.35+Math.random()*0.25,
    });
    lx += tw + spW;
  }
  totalPassageH = Math.max(...words.map(w=>w.hy)) + lspace * 3;
}

function repositionHomes(){
  const fs = lvFS(), lspace = lvLSPACE(), margin = lvMARGIN();
  const cfg = lvCFG();
  ctx.font = `${fs}px ${FONT}`;
  const spW  = ctx.measureText(' ').width;
  const maxW = W - margin * 2;
  const tokens = cfg.passage.split(' ');
  let lx=0, line=0, idx=0;
  for(const text of tokens){
    const tw = ctx.measureText(text).width;
    if(lx + tw > maxW && lx > 0){ line++; lx=0; }
    if(words[idx]){
      const hx=margin+lx+tw/2, hy=TOP+line*lspace;
      words[idx].hx=hx; words[idx].hy=hy; words[idx].ohx=hx; words[idx].ohy=hy; words[idx].tw=tw;
    }
    lx += tw+spW; idx++;
  }
  totalPassageH = Math.max(...words.map(w=>w.hy)) + lspace * 3;
}

// ─── CANVAS RESIZE ────────────────────────────────
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
let W = 0, H = 0;
function resize(){
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
  if(words.length) repositionHomes();
}
window.addEventListener('resize', resize);

// ─── SCORE DOM ────────────────────────────────────
function updateScore(){
  const lv = lvCFG();
  const mins = Math.floor(timeLeft/60);
  const secs = Math.floor(timeLeft%60);
  document.getElementById('sc-level').textContent = lv.label;
  document.getElementById('sc-timer').textContent = `${mins}:${secs.toString().padStart(2,'0')}`;
  document.getElementById('sc-found').textContent = `${found.size} / ${lvGOLD().length}`;
}

// ─── TRAP TRIGGER ─────────────────────────────────
function triggerTrap(w){
  w.trapTriggered = true;
  trapHits++;
  bursts.push({ x:w.x, screenY:w.y-scrollY, t:1.0, rgb:[180,40,40], big:true });
  queueToast({ tag:'// 干扰', word:'ERROR', color:[180,40,40],
               brief:'信号污染——附近的词被打乱了。', dur:2500 });

  for(const ow of words){
    if(ow===w || ow.trapTriggered) continue;
    const d = Math.hypot(ow.x - w.x, ow.y - w.y);
    if(d < BLAST_R){
      const strength = 1 - d/BLAST_R;
      ow.scrambleTimer = SCRAMBLE_T * (0.6 + strength * 0.7);
      ow.scrambleSeed  = Math.random() * 100;
      const ang = Math.atan2(ow.y - w.y, ow.x - w.x);
      ow.vx += Math.cos(ang) * strength * 18;
      ow.vy += Math.sin(ang) * strength * 18;
      if(ow.goldIndex >= 0 && !found.has(ow.goldIndex) && !ow.goldMissed){
        ow.corrupted = true;
        ow.goldAlpha = 0;
        ow.revealTimer = 0;
      }
    }
  }
}

// ─── UPDATE ───────────────────────────────────────
function update(dt){
  if(phase !== 'explore') return;
  pulseT   += dt * 0.018;
  frameCount++;
  const sec = dt * 16.67 / 1000;

  // Timer
  timeLeft = Math.max(0, timeLeft - sec);
  updateScore();
  if(timeLeft <= 0){ checkEnd(); return; }

  // Scroll upward
  const cfg = lvCFG();
  const hasFingers = Object.keys(pointers).length > 0;
  const targetVel  = hasFingers ? cfg.scrollSlow : cfg.scrollNorm;
  scrollVel += (targetVel - scrollVel) * 0.05;
  scrollY   += scrollVel * sec;

  const pts = Object.values(pointers);

  for(const w of words){
    const approxSy = w.hy - scrollY;

    // Gold missed off top
    if(w.goldIndex >= 0 && !found.has(w.goldIndex) && !w.goldMissed && approxSy < -80){
      w.goldMissed = true; missed++;
      missedFx.push({ x:w.hx, t:1.5, label:lvGOLD()[w.goldIndex].text.toUpperCase() });
      updateScore();
    }

    // Regular words loop back to bottom
    if(!w.trapWord && w.goldIndex < 0 && approxSy < -(lvLSPACE()*2)){
      w.hy += totalPassageH; w.y = w.hy; w.x = w.hx; w.vx = 0; w.vy = 0;
      continue;
    }

    // Cull physics for far-off words
    if(approxSy < -200 || approxSy > H + 150){
      w.x=w.hx; w.y=w.hy; w.vx=0; w.vy=0; continue;
    }

    // Decrement scramble timer
    if(w.scrambleTimer > 0){
      w.scrambleTimer = Math.max(0, w.scrambleTimer - sec);
      if(w.scrambleTimer <= 0) w.corrupted = false;
    }

    // Wave motion
    w.vx += Math.sin(pulseT * w.waveFreq + w.waveOff) * 0.032;
    w.vy += Math.cos(pulseT * w.waveFreq * 0.8 + w.waveOff * 1.2) * 0.032;

    // Spring
    w.vx += (w.hx - w.x) * SPRING;
    w.vy += (w.hy - w.y) * SPRING;

    // Finger repulsion
    for(const p of pts){
      const dx = w.x - p.x, dy = w.y - (p.y + scrollY);
      const d  = Math.sqrt(dx*dx + dy*dy);
      if(d < REPEL_R && d > 0.5){
        const f = (1-d/REPEL_R) * REPEL_F;
        w.vx += dx/d*f; w.vy += dy/d*f;
      }
    }
    w.vx *= DAMP; w.vy *= DAMP;
    w.x  += w.vx * dt; w.y += w.vy * dt;

    // Gold reveal (finger only, not while corrupted)
    if(w.goldIndex >= 0 && !found.has(w.goldIndex) && !w.goldMissed && !w.corrupted){
      let bonus = 0;
      for(const p of pts){
        const d = Math.hypot(p.x-w.hx, p.y+scrollY-w.hy);
        if(d < 110) bonus = Math.max(bonus, 1-d/110);
      }
      w.goldAlpha += (bonus - w.goldAlpha) * 0.10;
      if(w.goldAlpha > 0.55){
        w.revealTimer += sec;
        if(w.revealTimer >= 1.0) collectWord(w);
      } else {
        w.revealTimer = Math.max(0, w.revealTimer - sec * 1.5);
      }
    }

    // Trap reveal + detonation
    if(w.trapWord && !w.trapTriggered){
      let bonus = 0;
      for(const p of pts){
        const d = Math.hypot(p.x-w.hx, p.y+scrollY-w.hy);
        if(d < 100) bonus = Math.max(bonus, 1-d/100);
      }
      w.trapAlpha += (bonus - w.trapAlpha) * 0.12;
      if(w.trapAlpha > 0.55){
        w.trapTimer += sec;
        if(w.trapTimer >= 0.4) triggerTrap(w);
      } else {
        w.trapTimer = Math.max(0, w.trapTimer - sec * 2.0);
      }
    }
  }

  // Decay effects
  for(const b of bursts)   b.t = Math.max(0, b.t - sec*(b.big?1.4:1.8));
  for(const e of missedFx) e.t = Math.max(0, e.t - sec*0.9);
  bursts   = bursts.filter(b=>b.t>0);
  missedFx = missedFx.filter(e=>e.t>0);

  if(found.size === lvGOLD().length) checkEnd();
}

// ─── COLLECT ──────────────────────────────────────
function collectWord(w){
  const gi = w.goldIndex;
  if(found.has(gi)) return;
  found.add(gi);
  const g = lvGOLD()[gi];
  updateScore();
  bursts.push({ x:w.x, screenY:w.y-scrollY, t:1.0, rgb:g.rgb });
  queueToast({ tag:'// 发现', word:g.text.toUpperCase(), color:g.rgb,
               brief:`${g.cn}  —  ${g.brief}`, dur:4000 });
  const gIdxs = lvGOLD().reduce((a,_,i)=>lvGOLD()[i].group===g.group?[...a,i]:a,[]);
  if(gIdxs.every(i=>found.has(i)) && !combosFound.has(g.group)){
    combosFound.add(g.group);
    queueToast({ tag:'// 组合', word:lvCOMBOS()[g.group].title, color:g.rgb,
                 brief:lvCOMBOS()[g.group].brief, dur:5000 });
  }
  if(found.size===lvGOLD().length) checkEnd();
}

function checkEnd(){
  if(phase==='ending') return;
  phase='ending';
  setTimeout(showEnd, 800);
}

// ─── TOAST ────────────────────────────────────────
function queueToast(data){
  toastQueue.push(data);
  if(!toastTimer) showNextToast();
}
function showNextToast(){
  if(!toastQueue.length){ toastTimer=null; return; }
  const d = toastQueue.shift();
  const [r,g,b] = d.color;
  document.getElementById('t-tag').textContent  = d.tag;
  document.getElementById('t-word').textContent = d.word;
  document.getElementById('t-word').style.color = `rgba(${r},${g},${b},0.9)`;
  document.getElementById('t-brief').textContent= d.brief;
  document.getElementById('toast').classList.add('show');
  toastTimer = setTimeout(()=>{
    document.getElementById('toast').classList.remove('show');
    toastTimer = setTimeout(showNextToast, 280);
  }, d.dur);
}

// ─── END / NEXT LEVEL ─────────────────────────────
function showEnd(){
  phase = 'idle';
  const lv    = lvCFG();
  const gold  = lvGOLD();
  const total = found.size;
  const stars = total>=gold.length?3:total>=(gold.length*0.6|0)?2:total>=3?1:0;
  const isLast = currentLevel === LEVELS.length - 1;

  document.getElementById('e-title').textContent =
    total===gold.length?'COMPLETE':total>=(gold.length>>1)?'PARTIAL':'SIGNAL LOST';
  document.getElementById('e-lv').textContent = `${lv.label} · ${lv.name} · ${lv.desc}`;
  const rc = gold.map(g=>`rgba(${g.rgb[0]},${g.rgb[1]},${g.rgb[2]},.88)`);
  document.getElementById('e-rows').innerHTML = gold.map((g,i)=>{
    const st = found.has(i)?'✓':(words.find(w=>w.goldIndex===i)?.goldMissed?'✗':'·');
    return `<span style="color:${rc[i]}">${g.text}</span>&nbsp;${st}`;
  }).join('&nbsp;&nbsp;');
  document.getElementById('e-score').innerHTML =
    `${'★'.repeat(stars)+'☆'.repeat(3-stars)}&nbsp;&nbsp;${total}/${gold.length} 词&nbsp;&nbsp;${missed} 丢失&nbsp;&nbsp;${trapHits} 被炸<br>` +
    (combosFound.size>0?`组合解锁 ${combosFound.size}/3`:'无组合');

  document.getElementById('e-next').style.display = isLast ? 'none' : '';
  document.getElementById('e-retry').textContent  = isLast ? '重新开始' : '再来一次';
  if(isLast) document.getElementById('e-retry').setAttribute('onpointerdown','currentLevel=0;startGame()');
  else       document.getElementById('e-retry').setAttribute('onpointerdown','startGame()');

  document.getElementById('end-ov').classList.remove('gone');
}

function nextLevel(){
  if(currentLevel < LEVELS.length-1){
    currentLevel++;
    startGame();
  }
}

// ─── DRAW ─────────────────────────────────────────
function draw(){
  ctx.fillStyle = '#f5f0e6'; ctx.fillRect(0,0,W,H);
  const fs = lvFS();
  ctx.font = `${fs}px ${FONT}`;
  ctx.textAlign='center'; ctx.textBaseline='middle';

  const dangerBars = [];
  const gold = lvGOLD();

  for(const w of words){
    const sy = w.y - scrollY;
    if(sy < -40 || sy > H+40) continue;

    // Scrambled
    if(w.scrambleTimer > 0){
      const fade   = w.scrambleTimer < 0.6 ? w.scrambleTimer/0.6 : 1;
      const seed   = pulseT * 10 + w.scrambleSeed;
      const chars  = glitchText(w.text, seed);
      const jx     = sy > -100 ? (Math.random()-0.5)*4 : 0;
      const jy     = sy > -100 ? (Math.random()-0.5)*3 : 0;
      ctx.fillStyle = `rgba(${TRAP_RGB[0]},${TRAP_RGB[1]},${TRAP_RGB[2]},${(fade*0.60).toFixed(2)})`;
      ctx.fillText(chars, w.x+jx, sy+jy);
      continue;
    }

    const isGold   = w.goldIndex >= 0;
    const isFound  = isGold && found.has(w.goldIndex);
    const isMissed = isGold && w.goldMissed;
    const isActive = isGold && !isFound && !isMissed;
    const isTrap   = w.trapWord && !w.trapTriggered;

    if(isFound){
      const [r,g,b] = gold[w.goldIndex].rgb;
      ctx.fillStyle = `rgba(${r},${g},${b},0.82)`;
      ctx.fillText(w.text, w.x, sy); continue;
    }
    if(isMissed){
      ctx.fillStyle = `rgba(${INK[0]},${INK[1]},${INK[2]},0.14)`;
      ctx.fillText(w.text, w.x, sy); continue;
    }
    if(w.trapTriggered) continue;

    if(isActive){
      const [gr,gg,gb] = gold[w.goldIndex].rgb;
      const a  = w.goldAlpha;
      const dr = Math.round(INK[0]+(gr-INK[0])*a);
      const dg = Math.round(INK[1]+(gg-INK[1])*a);
      const db = Math.round(INK[2]+(gb-INK[2])*a);
      if(a > 0.55){
        const pulse = Math.sin(pulseT*6)*0.12+0.88;
        ctx.shadowColor=`rgba(${gr},${gg},${gb},0.28)`; ctx.shadowBlur=8+pulse*4;
        ctx.fillStyle=`rgba(${dr},${dg},${db},0.92)`;
        ctx.fillText(w.text, w.x, sy);
        ctx.shadowBlur=0; ctx.shadowColor='transparent';
        const prog = Math.min(1, w.revealTimer/1.0);
        if(prog>0){
          ctx.beginPath();
          ctx.arc(w.x, sy, w.tw/2+8, -Math.PI/2, -Math.PI/2+prog*Math.PI*2);
          ctx.strokeStyle=`rgba(${gr},${gg},${gb},0.50)`; ctx.lineWidth=1.5; ctx.stroke();
        }
      } else {
        ctx.fillStyle = `rgba(${dr},${dg},${db},0.88)`;
        ctx.fillText(w.text, w.x, sy);
      }
      if(sy>0 && sy<90) dangerBars.push({ rgb:[gr,gg,gb], danger:1-sy/90 });
      continue;
    }

    if(isTrap){
      const a  = w.trapAlpha;
      const dr = Math.round(INK[0]+(TRAP_RGB[0]-INK[0])*a);
      const dg = Math.round(INK[1]+(TRAP_RGB[1]-INK[1])*a);
      const db = Math.round(INK[2]+(TRAP_RGB[2]-INK[2])*a);
      if(a > 0.45){
        const flicker = Math.sin(pulseT*35)*0.22+0.78;
        ctx.fillStyle = `rgba(${dr},${dg},${db},${(0.90*flicker).toFixed(2)})`;
        const prog = Math.min(1, w.trapTimer/0.4);
        if(prog>0){
          ctx.beginPath();
          ctx.arc(w.x, sy, w.tw/2+8, -Math.PI/2, -Math.PI/2+prog*Math.PI*2);
          ctx.strokeStyle=`rgba(${TRAP_RGB[0]},${TRAP_RGB[1]},${TRAP_RGB[2]},0.60)`;
          ctx.lineWidth=1.5; ctx.stroke();
        }
      } else {
        ctx.fillStyle = `rgba(${dr},${dg},${db},0.88)`;
      }
      ctx.fillText(w.text, w.x, sy);
      if(sy>0 && sy<90) dangerBars.push({ rgb:TRAP_RGB, danger:1-sy/90 });
      continue;
    }

    // Regular word
    ctx.fillStyle = `rgba(${INK[0]},${INK[1]},${INK[2]},0.88)`;
    ctx.fillText(w.text, w.x, sy);
  }

  // Burst rings
  for(const b of bursts){
    const [r,g,bb] = b.rgb;
    if(b.big){
      const r1 = (1-b.t)*90, r2 = (1-b.t)*BLAST_R;
      ctx.beginPath(); ctx.arc(b.x,b.screenY,r1,0,Math.PI*2);
      ctx.strokeStyle=`rgba(${r},${g},${bb},${(b.t*0.70).toFixed(2)})`; ctx.lineWidth=3; ctx.stroke();
      ctx.beginPath(); ctx.arc(b.x,b.screenY,r2,0,Math.PI*2);
      ctx.strokeStyle=`rgba(${r},${g},${bb},${(b.t*0.30).toFixed(2)})`; ctx.lineWidth=1; ctx.stroke();
    } else {
      const radius = (1-b.t)*55;
      ctx.beginPath(); ctx.arc(b.x,b.screenY,radius,0,Math.PI*2);
      ctx.strokeStyle=`rgba(${r},${g},${bb},${(b.t*0.55).toFixed(2)})`; ctx.lineWidth=2; ctx.stroke();
    }
  }

  // Missed labels
  ctx.textAlign='left'; ctx.textBaseline='top';
  ctx.font=`11px ${FONT}`;
  for(const e of missedFx){
    ctx.fillStyle=`rgba(160,30,30,${(e.t*0.58).toFixed(2)})`;
    ctx.fillText(`↑ ${e.label}`, Math.max(8,Math.min(W-80,e.x-20)), 10);
  }

  // Gradient fades
  const tg = ctx.createLinearGradient(0,0,0,92);
  tg.addColorStop(0,'#f5f0e6'); tg.addColorStop(1,'rgba(245,240,230,0)');
  ctx.fillStyle=tg; ctx.fillRect(0,0,W,92);
  const bg = ctx.createLinearGradient(0,H-80,0,H);
  bg.addColorStop(0,'rgba(245,240,230,0)'); bg.addColorStop(1,'#f5f0e6');
  ctx.fillStyle=bg; ctx.fillRect(0,H-80,W,80);

  // Danger bars (drawn after gradient)
  for(const db of dangerBars){
    const [r,g,b] = db.rgb;
    ctx.fillStyle=`rgba(${r},${g},${b},${(db.danger*0.50).toFixed(2)})`;
    ctx.fillRect(0, 50, W*db.danger, 3);
  }
}

// ─── INPUT ────────────────────────────────────────
function getXY(e){ const r=canvas.getBoundingClientRect(); return {x:e.clientX-r.left,y:e.clientY-r.top}; }
canvas.addEventListener('pointerdown',  e=>{ canvas.setPointerCapture(e.pointerId); pointers[e.pointerId]=getXY(e); });
canvas.addEventListener('pointermove',  e=>{ pointers[e.pointerId]=getXY(e); });
canvas.addEventListener('pointerup',    e=>{ delete pointers[e.pointerId]; });
canvas.addEventListener('pointercancel',e=>{ delete pointers[e.pointerId]; });

// ─── START ────────────────────────────────────────
function startGame(){
  document.getElementById('start').classList.add('gone');
  document.getElementById('end-ov').classList.add('gone');
  document.getElementById('toast').classList.remove('show');
  if(toastTimer){ clearTimeout(toastTimer); toastTimer=null; }
  toastQueue=[]; bursts=[]; missedFx=[];
  found=new Set(); combosFound=new Set(); missed=0; trapHits=0;
  scrollY=0; scrollVel=0; pulseT=0; frameCount=0;
  timeLeft=lvCFG().time; phase='idle';
  updateScore();

  resize(); layout();
  phase='explore';
}

// ─── LOOP ─────────────────────────────────────────
let lastT=0;
function loop(t){
  const dt=Math.min((t-lastT)/16.67,3); lastT=t;
  update(dt); draw();
  requestAnimationFrame(loop);
}
resize(); layout();
requestAnimationFrame(loop);
</script>
