<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>SIGNAL</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#07070e}
body{border-radius:24px;overflow:hidden}
#c{position:fixed;inset:0;touch-action:none;user-select:none;-webkit-tap-highlight-color:transparent}
.ov{position:fixed;inset:0;z-index:10;display:flex;flex-direction:column;align-items:center;
    justify-content:center;background:#07070e;transition:opacity .4s}
.ov.gone{opacity:0;pointer-events:none}
#s-title{font-size:clamp(18px,5vw,30px);font-weight:400;color:rgba(255,255,255,.72);
  letter-spacing:10px;margin-bottom:8px;font-family:'Courier New',monospace}
#s-sub{font-size:10px;color:rgba(200,255,80,.35);letter-spacing:4px;margin-bottom:28px;
  font-family:'Courier New',monospace}
#s-body{font-size:14px;color:rgba(180,180,210,.45);line-height:2.4;text-align:center;
  margin-bottom:40px;max-width:280px;font-family:-apple-system,sans-serif}
#s-body b{color:rgba(200,255,80,.7);font-weight:400}
.btn{font-family:'Courier New',monospace;font-size:11px;letter-spacing:5px;
  color:rgba(200,255,80,.65);border:1px solid rgba(200,255,80,.2);background:transparent;
  padding:14px 34px;cursor:pointer;touch-action:none;outline:none;-webkit-tap-highlight-color:transparent}
#e-title{font-size:clamp(22px,5vw,34px);letter-spacing:7px;color:rgba(200,255,80,.88);
  margin-bottom:6px;font-family:'Courier New',monospace}
#e-rows{font-size:12px;color:rgba(180,180,200,.5);letter-spacing:2px;
  line-height:2.5;margin:16px 0;font-family:'Courier New',monospace;text-align:center}
#e-rule{width:36px;height:1px;background:rgba(255,255,255,.1);margin:14px auto}
#e-score{font-size:13px;color:rgba(180,180,200,.4);margin-bottom:28px;
  font-family:-apple-system,sans-serif;text-align:center;line-height:1.8}
</style>
</head>
<body>
<canvas id="c"></canvas>

<div id="start" class="ov">
  <div id="s-title">SIGNAL</div>
  <div id="s-sub">语义信号</div>
  <div id="s-body">
    用手指<b>扫动</b>文字<br>
    隐藏的词会发光浮现<br>
    语义相关的词会<b>自动聚拢</b><br>
    收集它们
  </div>
  <button class="btn" onpointerdown="startGame()">BEGIN →</button>
</div>

<div id="end-ov" class="ov gone">
  <div id="e-title"></div>
  <div id="e-rows"></div>
  <div id="e-rule"></div>
  <div id="e-score"></div>
  <button class="btn" onpointerdown="startGame()">AGAIN</button>
</div>

<script>
// ─── CANVAS ───────────────────────────────────────
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
let W = 0, H = 0;
function resize(){
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
  if(words.length) repositionHomes();
}
window.addEventListener('resize', resize);

// ─── PASSAGE ──────────────────────────────────────
const PASSAGE =
  'the city never slept data streamed through neural pathways in endless cascades ' +
  'each packet a memory waiting to be processed fragments assembled themselves ' +
  'glimpses of faces echoes of conversations the ghost of a summer afternoon ' +
  'that had never quite happened she remembered the algorithm that predicted rain ' +
  'three seconds before the clouds gathered patterns emerging from noise ' +
  'signal buried in static the model learned what humans forgot how to notice ' +
  'the weight of air the tension before lightning the smell of ozone rising ' +
  'between the words lay the spaces where meaning lived context was everything ' +
  'a token alone was nothing but placed beside its neighbours it became thought ' +
  'became intention became the ghost of a mind reaching through time toward another ' +
  'mind to say I was here I was here I was here';

// ─── ROUNDS ───────────────────────────────────────
const ROUNDS = [
  {
    ghost:       'memory',
    col:         'rgba(200,255,80,',
    rgb:         [200,255,80],
    label:       'MEMORY',
    cluster:     new Set(['fragments','assembled','echoes','glimpses','remembered','ghost','conversations']),
    timeLimit:   0,
    minFollowers: 3,
  },
  {
    ghost:       'signal',
    col:         'rgba(80,220,255,',
    rgb:         [80,220,255],
    label:       'SIGNAL',
    cluster:     new Set(['data','streamed','pathways','patterns','noise','static','cascades','packet']),
    timeLimit:   35,
    minFollowers: 4,
  },
  {
    ghost:       'mind',
    col:         'rgba(255,160,80,',
    rgb:         [255,160,80],
    label:       'MIND',
    cluster:     new Set(['thought','intention','meaning','reaching','context','spaces','words','lived']),
    timeLimit:   25,
    minFollowers: 5,
  },
];

// ─── PHYSICS CONSTANTS ────────────────────────────
const FS         = 15;
const LSPACE     = 34;
const MARGIN     = 26;
const TOP        = 58;
const SPRING     = 0.038;
const DAMP       = 0.87;
const REPEL_R    = 90;
const REPEL_F    = 5.5;
const ATTRACT_F  = 0.20;  // cluster → anchor attraction
const ATTRACT_R  = 320;   // large radius so all cluster words feel pull
const ATTACH_R   = 62;    // "attached" visual distance
const CLUS_SPRING = 0.005; // cluster word spring after anchor activates (very weak)
const ZONE_NEED  = 1.8;   // seconds with enough followers to complete

// ─── STATE ────────────────────────────────────────
let words      = [];
let phase      = 'idle';
let round      = 0;
let score      = 0;
let anchor     = null;
let zoneTimer  = 0;   // time with enough followers
let roundTimer = 0;   // herd phase elapsed (for time limit)
let roundStars   = [0,0,0];
let roundGains   = [0,0,0];
let roundBonuses = [0,0,0];
let scoreMsg   = { t:0, text:'', col:'' };
let pointers   = {};
let pulseT     = 0;

// ─── LAYOUT ───────────────────────────────────────
function layout(){
  words = [];
  ctx.font = `${FS}px 'Courier New',monospace`;
  const spW  = ctx.measureText(' ').width;
  const maxW = W - MARGIN * 2;
  const tokens = PASSAGE.split(' ');
  let lx = 0, line = 0;
  for(const text of tokens){
    const tw = ctx.measureText(text).width;
    if(lx + tw > maxW && lx > 0){ line++; lx = 0; }
    const hx = MARGIN + lx + tw/2;
    const hy = TOP + line * LSPACE;
    words.push({ text, tw, hx, hy, x: hx, y: hy, vx: 0, vy: 0,
                 isGhost: false, ghostAlpha: 0, attached: false, clusterActive: false });
    lx += tw + spW;
  }
}

function repositionHomes(){
  ctx.font = `${FS}px 'Courier New',monospace`;
  const spW  = ctx.measureText(' ').width;
  const maxW = W - MARGIN * 2;
  const tokens = PASSAGE.split(' ');
  let lx = 0, line = 0, idx = 0;
  for(const text of tokens){
    const tw = ctx.measureText(text).width;
    if(lx + tw > maxW && lx > 0){ line++; lx = 0; }
    if(words[idx]){ words[idx].hx = MARGIN + lx + tw/2; words[idx].hy = TOP + line * LSPACE; words[idx].tw = tw; }
    lx += tw + spW; idx++;
  }
}

// ─── ROUND SETUP ──────────────────────────────────
function setupRound(r){
  round = r; phase = 'discover';
  anchor = null; zoneTimer = 0; roundTimer = 0;
  for(const w of words){
    w.isGhost = false; w.ghostAlpha = 0;
    w.attached = false; w.clusterActive = false;
    w.vx = 0; w.vy = 0;
  }
  const gw = words.find(w => w.text === ROUNDS[r].ghost);
  if(gw) gw.isGhost = true;
}

// ─── GHOST VISIBILITY ─────────────────────────────
function ghostVisibility(gw){
  let clearance = 0, count = 0;
  for(const w of words){
    if(w === gw || w.isGhost) continue;
    const d = Math.hypot(w.x - gw.hx, w.y - gw.hy);
    if(d < 85){ clearance += d/85; count++; }
  }
  if(count === 0) return 1;
  return Math.min(1, clearance/count);
}

// ─── PHYSICS ──────────────────────────────────────
function update(dt){
  pulseT += dt * 0.018;
  const sec = dt * 16.67 / 1000;
  const R = ROUNDS[round];

  // Auto-activate ghost
  if(phase === 'discover'){
    const gw = words.find(w => w.isGhost);
    if(gw && gw.ghostAlpha > 0.55) activateAnchor(gw);
  }

  // Herd-phase timing
  if(phase === 'herd'){
    roundTimer += sec;
    if(R.timeLimit > 0 && roundTimer >= R.timeLimit){ timeoutRound(); return; }
  }

  const pts = Object.values(pointers);

  for(const w of words){
    // ── Anchor ──
    if(w === anchor){
      // Repelled by finger (player nudges it)
      for(const p of pts){
        const dx = w.x - p.x, dy = w.y - p.y;
        const d  = Math.sqrt(dx*dx + dy*dy);
        if(d < REPEL_R * 1.4 && d > 0.5){
          const f = (1 - d/(REPEL_R*1.4)) * REPEL_F * 1.5;
          w.vx += dx/d * f; w.vy += dy/d * f;
        }
      }
      w.vx *= 0.91; w.vy *= 0.91;
      w.x += w.vx * dt; w.y += w.vy * dt;
      w.x = Math.max(22, Math.min(W-22, w.x));
      w.y = Math.max(22, Math.min(H-22, w.y));
      continue;
    }

    // ── Ghost (not yet activated) ──
    if(w.isGhost){
      w.vx += (w.hx - w.x) * SPRING;
      w.vy += (w.hy - w.y) * SPRING;
      w.vx *= DAMP; w.vy *= DAMP;
      w.x += w.vx * dt; w.y += w.vy * dt;

      // Visibility: clearance + finger proximity bonus
      const vis = ghostVisibility(w);
      let fingerBonus = 0;
      for(const p of pts){
        const d = Math.hypot(p.x - w.hx, p.y - w.hy);
        if(d < 130) fingerBonus = Math.max(fingerBonus, (1 - d/130) * 0.22);
      }
      const target = Math.max(0.07, vis + fingerBonus);  // always at least 0.07
      w.ghostAlpha += (target - w.ghostAlpha) * 0.07;
      continue;
    }

    // ── Regular / cluster words ──
    const sp = w.clusterActive ? CLUS_SPRING : SPRING;
    w.vx += (w.hx - w.x) * sp;
    w.vy += (w.hy - w.y) * sp;

    // Finger repulsion
    for(const p of pts){
      const dx = w.x - p.x, dy = w.y - p.y;
      const d  = Math.sqrt(dx*dx + dy*dy);
      if(d < REPEL_R && d > 0.5){
        const f = (1 - d/REPEL_R) * REPEL_F;
        w.vx += dx/d * f; w.vy += dy/d * f;
      }
    }

    // Cluster attraction toward anchor
    if(w.clusterActive && anchor){
      const dx = anchor.x - w.x, dy = anchor.y - w.y;
      const d  = Math.sqrt(dx*dx + dy*dy);
      if(d < ATTRACT_R && d > 0.5){
        const f = (1 - d/ATTRACT_R) * ATTRACT_F;
        w.vx += dx/d * f; w.vy += dy/d * f;
      }
      w.attached = d < ATTACH_R;
    } else {
      w.attached = false;
    }

    w.vx *= DAMP; w.vy *= DAMP;
    w.x += w.vx * dt; w.y += w.vy * dt;
  }

  // ── Collection progress (no zone, just follower count) ──
  if(phase === 'herd' && anchor){
    const attached = words.filter(w => w.attached).length;
    if(attached >= R.minFollowers){
      zoneTimer += sec;
      if(zoneTimer >= ZONE_NEED) completeRound();
    } else {
      zoneTimer = Math.max(0, zoneTimer - sec * 0.6);
    }
  }

  if(scoreMsg.t > 0) scoreMsg.t = Math.max(0, scoreMsg.t - dt * 0.028);
}

// ─── ACTIVATE ─────────────────────────────────────
function activateAnchor(gw){
  gw.isGhost = false;
  anchor = gw;
  phase  = 'herd';
  zoneTimer = 0; roundTimer = 0;
  // Enable cluster attraction for this round's cluster words
  const R = ROUNDS[round];
  for(const w of words){
    if(R.cluster.has(w.text)) w.clusterActive = true;
  }
}

// ─── COMPLETE ROUND ───────────────────────────────
function completeRound(){
  const R = ROUNDS[round];
  const followers = words.filter(w => w.attached).length;
  let bonus = 0;
  if(R.timeLimit > 0) bonus = Math.min(5, Math.floor(Math.max(0, R.timeLimit - roundTimer) / 5));

  let stars = followers >= R.minFollowers + 2 ? 3 : followers >= R.minFollowers ? 2 : followers > 0 ? 1 : 0;
  roundStars[round]   = stars;
  roundGains[round]   = followers;
  roundBonuses[round] = bonus;
  score += followers + bonus;

  const bonusTxt = bonus > 0 ? ` +${bonus}⚡` : '';
  scoreMsg = { t: 1.5, text: `+${followers}${bonusTxt}`, col: R.col };

  for(const w of words){ w.clusterActive = false; w.attached = false; }
  phase = 'idle'; anchor = null;

  if(round < ROUNDS.length - 1) setTimeout(()=> setupRound(round + 1), 1200);
  else setTimeout(()=> endGame(), 1400);
}

// ─── TIMEOUT ──────────────────────────────────────
function timeoutRound(){
  const followers = words.filter(w => w.attached).length;
  roundStars[round]   = followers > 0 ? 1 : 0;
  roundGains[round]   = followers;
  roundBonuses[round] = 0;
  score += followers;

  scoreMsg = { t: 1.6, text: '时间结束', col: 'rgba(255,80,80,' };
  for(const w of words){ w.clusterActive = false; w.attached = false; }
  phase = 'idle'; anchor = null;

  if(round < ROUNDS.length - 1) setTimeout(()=> setupRound(round + 1), 1300);
  else setTimeout(()=> endGame(), 1500);
}

// ─── END GAME ─────────────────────────────────────
function endGame(){
  phase = 'idle';
  const total = roundStars.reduce((a,b)=>a+b,0);
  document.getElementById('e-title').textContent =
    total >= 8 ? 'PERFECT' : total >= 5 ? 'COMPLETE' : total >= 2 ? 'PARTIAL' : 'SIGNAL LOST';
  const rc = ['rgba(200,255,80,0.65)','rgba(80,220,255,0.65)','rgba(255,160,80,0.65)'];
  document.getElementById('e-rows').innerHTML = ROUNDS.map((r,i) => {
    const bn = roundBonuses[i] > 0 ? ` +${roundBonuses[i]}⚡` : '';
    return `<span style="color:${rc[i]}">${r.label}</span>&nbsp; ${'★'.repeat(roundStars[i])+'☆'.repeat(3-roundStars[i])}&nbsp; ${roundGains[i]}词${bn}`;
  }).join('<br>');
  const msgs = ['语义完全激活','信号大部分捕获','信号微弱，有残留','语义消散在噪声中'];
  document.getElementById('e-score').textContent = `${score} 信号词 · ${msgs[Math.max(0,3-Math.ceil(total/3))]}`;
  document.getElementById('end-ov').classList.remove('gone');
}

// ─── DRAW ─────────────────────────────────────────
function draw(){
  ctx.fillStyle = '#07070e'; ctx.fillRect(0,0,W,H);
  const R  = round < ROUNDS.length ? ROUNDS[round] : ROUNDS[0];
  const [ar,ag,ab] = R.rgb;

  // ── Timer bar (R2/R3) ──
  if(phase === 'herd' && R.timeLimit > 0){
    const pct = Math.max(0, 1 - roundTimer / R.timeLimit);
    const bX = 18, bY = 34, bW = W - 36;
    ctx.fillStyle = 'rgba(255,255,255,0.05)'; ctx.fillRect(bX, bY, bW, 2);
    const isLow = pct < 0.25;
    const lf    = isLow ? (Math.sin(pulseT * 9) * 0.3 + 0.7) : 1;
    ctx.fillStyle = isLow ? `rgba(255,80,80,${(0.65*lf).toFixed(2)})` : R.col + '0.5)';
    ctx.fillRect(bX, bY, bW * pct, 2);
  }

  // ── Attachment lines ──
  if(anchor && phase === 'herd'){
    for(const w of words){
      if(!w.attached) continue;
      const d = Math.hypot(w.x-anchor.x, w.y-anchor.y);
      const a = (1 - d/ATTACH_R) * 0.3;
      ctx.beginPath(); ctx.moveTo(anchor.x, anchor.y); ctx.lineTo(w.x, w.y);
      ctx.strokeStyle = R.col + a + ')'; ctx.lineWidth = 0.8; ctx.stroke();
    }
  }

  // ── Words ──
  ctx.font = `${FS}px 'Courier New',monospace`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';

  for(const w of words){
    if(w === anchor) continue;

    if(w.isGhost){
      // Ghost: always has faint shimmer, brighter near finger
      const a = Math.min(0.92, w.ghostAlpha);
      if(a < 0.02) continue;
      const pulse = Math.sin(pulseT * 4) * 0.4 + 0.6;
      ctx.fillStyle = R.col + (a * pulse).toFixed(2) + ')';
      // Faint underline hint when below threshold
      if(w.ghostAlpha > 0.15 && w.ghostAlpha < 0.55){
        ctx.strokeStyle = R.col + (a * 0.3).toFixed(2) + ')';
        ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(w.x - w.tw/2, w.y + 9); ctx.lineTo(w.x + w.tw/2, w.y + 9); ctx.stroke();
      }
      ctx.fillText(w.text, w.x, w.y);
      continue;
    }

    const disp  = Math.hypot(w.x - w.hx, w.y - w.hy);
    const speed = Math.hypot(w.vx, w.vy);
    const e     = Math.min(1, disp/55 + speed*0.1);
    let ba, r=235, g=235, b=255;

    if(w.attached){
      ba = 0.82; r=ar; g=ag; b=ab;
    } else if(w.clusterActive){
      // Cluster word drifting toward anchor
      const d = anchor ? Math.hypot(w.x-anchor.x, w.y-anchor.y) : 999;
      const proximity = Math.max(0, 1 - d/ATTRACT_R);
      ba = 0.22 + proximity * 0.45;
      r = Math.round(235 + (ar-235)*proximity);
      g = Math.round(235 + (ag-235)*proximity);
      b = Math.round(255 + (ab-255)*proximity);
    } else {
      ba = 0.22 + e * 0.48;
      if(e > 0.25){
        r = Math.round(235 + (200-235)*e);
        g = Math.round(235 + (255-235)*e);
        b = Math.round(255 + (80 -255)*e);
      }
    }
    ctx.fillStyle = `rgba(${r},${g},${b},${ba.toFixed(2)})`;
    ctx.fillText(w.text, w.x, w.y);
  }

  // ── Anchor ──
  if(anchor){
    const p = Math.sin(pulseT * 4) * 0.15 + 0.85;
    // Outer glow
    ctx.beginPath(); ctx.arc(anchor.x, anchor.y, 24, 0, Math.PI*2);
    ctx.strokeStyle = `rgba(${ar},${ag},${ab},${(0.15*p).toFixed(2)})`; ctx.lineWidth = 10; ctx.stroke();
    ctx.beginPath(); ctx.arc(anchor.x, anchor.y, 24, 0, Math.PI*2);
    ctx.strokeStyle = `rgba(${ar},${ag},${ab},${(0.45*p).toFixed(2)})`; ctx.lineWidth = 1.5; ctx.stroke();

    // Collection progress ring (fills as followers gather)
    if(phase === 'herd'){
      const attached  = words.filter(w => w.attached).length;
      const minF = ROUNDS[round].minFollowers;
      const prog  = zoneTimer / ZONE_NEED;            // 0→1 while completing
      const fProg = Math.min(1, attached / minF);      // follower count progress 0→1

      if(fProg > 0){
        // Outer ring showing follower count
        ctx.beginPath();
        ctx.arc(anchor.x, anchor.y, 32, -Math.PI/2, -Math.PI/2 + fProg*Math.PI*2);
        ctx.strokeStyle = `rgba(${ar},${ag},${ab},0.35)`; ctx.lineWidth = 2; ctx.stroke();
      }
      if(prog > 0){
        // Inner fill ring showing completion countdown
        ctx.beginPath();
        ctx.arc(anchor.x, anchor.y, 28, -Math.PI/2, -Math.PI/2 + prog*Math.PI*2);
        ctx.strokeStyle = `rgba(${ar},${ag},${ab},0.85)`; ctx.lineWidth = 3; ctx.stroke();
      }
    }

    // Text
    ctx.font = `bold ${FS+1}px 'Courier New',monospace`;
    ctx.fillStyle = `rgba(${ar},${ag},${ab},0.95)`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(anchor.text, anchor.x, anchor.y);
    ctx.font = `${FS}px 'Courier New',monospace`;
  }

  // ── HUD ──
  ctx.textAlign = 'left'; ctx.textBaseline = 'top';
  ctx.font = '10px "Courier New",monospace';
  ctx.fillStyle = 'rgba(160,160,185,.3)';
  ctx.fillText(`${round+1} / 3`, 18, 16);
  ctx.textAlign = 'right';
  ctx.fillText(`${score}`, W-18, 16);

  // Bottom hint
  ctx.textAlign = 'center'; ctx.textBaseline = 'bottom';
  ctx.font = '11px "Courier New",monospace';
  if(phase === 'discover'){
    ctx.fillStyle = 'rgba(160,160,185,.22)';
    ctx.fillText('扫动文字', W/2, H-20);
  } else if(phase === 'herd'){
    const attached = words.filter(w => w.attached).length;
    const minF = ROUNDS[round].minFollowers;
    if(R.timeLimit > 0 && roundTimer > R.timeLimit * 0.78){
      const lf = Math.sin(pulseT*10)*0.4+0.6;
      ctx.fillStyle = `rgba(255,80,80,${(lf*0.65).toFixed(2)})`;
      ctx.fillText(`${Math.ceil(R.timeLimit - roundTimer)}s`, W/2, H-20);
    } else if(attached < minF){
      ctx.fillStyle = R.col + '0.25)';
      ctx.fillText(`收集中  ${attached} / ${minF}`, W/2, H-20);
    } else {
      ctx.fillStyle = R.col + '0.4)';
      ctx.fillText('聚拢完成 — 稳住', W/2, H-20);
    }
  }

  // Score popup
  if(scoreMsg.t > 0){
    const a = Math.min(1, scoreMsg.t);
    ctx.font = 'bold 20px "Courier New",monospace';
    ctx.fillStyle = scoreMsg.col + a + ')';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(scoreMsg.text, W/2, H/2);
  }
}

// ─── INPUT ────────────────────────────────────────
function getXY(e){ const r=canvas.getBoundingClientRect(); return {x:e.clientX-r.left,y:e.clientY-r.top}; }
canvas.addEventListener('pointerdown',  e => { canvas.setPointerCapture(e.pointerId); pointers[e.pointerId]=getXY(e); });
canvas.addEventListener('pointermove',  e => { pointers[e.pointerId]=getXY(e); });
canvas.addEventListener('pointerup',    e => { delete pointers[e.pointerId]; });
canvas.addEventListener('pointercancel',e => { delete pointers[e.pointerId]; });

// ─── GAME START ───────────────────────────────────
function startGame(){
  document.getElementById('start').classList.add('gone');
  document.getElementById('end-ov').classList.add('gone');
  score=0; round=0; phase='idle'; pulseT=0;
  roundStars=[0,0,0]; roundGains=[0,0,0]; roundBonuses=[0,0,0];
  if(!words.length){ resize(); layout(); }
  else { for(const w of words){ w.vx=0;w.vy=0;w.x=w.hx;w.y=w.hy; } }
  setupRound(0);
}

// ─── LOOP ─────────────────────────────────────────
let lastT=0;
function loop(t){
  const dt=Math.min((t-lastT)/16.67,3); lastT=t;
  if(phase!=='idle') update(dt);
  draw();
  requestAnimationFrame(loop);
}
resize(); layout();
requestAnimationFrame(loop);
</script>
</body>
