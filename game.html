<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>SIGNAL</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#f5f0e6}
body{border-radius:24px;overflow:hidden}
#c{position:fixed;inset:0;touch-action:none;user-select:none;-webkit-tap-highlight-color:transparent}

.ov{position:fixed;inset:0;z-index:10;display:flex;flex-direction:column;align-items:center;
    justify-content:center;background:#f5f0e6;transition:opacity .4s}
.ov.gone{opacity:0;pointer-events:none}
#s-title{font-size:clamp(20px,5vw,30px);letter-spacing:10px;color:rgba(20,12,5,.78);
  margin-bottom:8px;font-family:ui-monospace,'SF Mono',Menlo,Consolas,monospace;font-weight:400}
#s-sub{font-size:11px;color:rgba(20,12,5,.35);letter-spacing:5px;margin-bottom:32px;
  font-family:ui-monospace,'SF Mono',Menlo,Consolas,monospace}
#s-body{font-size:15px;color:rgba(20,12,5,.50);line-height:2.4;text-align:center;
  margin-bottom:40px;max-width:280px;font-family:-apple-system,sans-serif}
#s-body b{color:rgba(20,12,5,.82);font-weight:500}
.btn{font-family:ui-monospace,'SF Mono',Menlo,Consolas,monospace;font-size:11px;letter-spacing:5px;
  color:rgba(20,12,5,.58);border:1px solid rgba(20,12,5,.22);background:transparent;
  padding:14px 32px;cursor:pointer;touch-action:none;outline:none;-webkit-tap-highlight-color:transparent}

/* Score bar */
#score{position:fixed;top:0;left:0;right:0;z-index:15;display:flex;align-items:center;
  padding:13px 16px 18px;font-family:ui-monospace,'SF Mono',Menlo,Consolas,monospace;
  font-size:12px;letter-spacing:2px;pointer-events:none;
  background:linear-gradient(to bottom,#f5f0e6 52%,rgba(245,240,230,0))}
#sc-name{flex:1;color:rgba(20,12,5,.25)}
#sc-timer{color:rgba(20,12,5,.62);margin-right:16px}
#sc-found{color:rgba(20,12,5,.52)}

/* Toast */
#toast{position:fixed;top:54px;left:14px;right:14px;z-index:15;
  background:rgba(245,240,228,0.97);border:1px solid rgba(20,12,5,.09);
  border-radius:10px;padding:13px 15px 14px;pointer-events:none;
  box-shadow:0 2px 14px rgba(20,12,5,.07);
  opacity:0;transform:translateY(-8px);
  transition:opacity .22s,transform .22s}
#toast.show{opacity:1;transform:translateY(0)}
#t-tag{font-size:10px;letter-spacing:4px;color:rgba(20,12,5,.28);
  font-family:ui-monospace,'SF Mono',Menlo,Consolas,monospace;margin-bottom:5px}
#t-word{font-size:17px;letter-spacing:4px;
  font-family:ui-monospace,'SF Mono',Menlo,Consolas,monospace;margin-bottom:4px}
#t-brief{font-size:13px;color:rgba(20,12,5,.55);line-height:1.7;
  font-family:-apple-system,sans-serif}

#e-title{font-size:clamp(24px,5vw,34px);letter-spacing:7px;color:rgba(20,12,5,.78);
  margin-bottom:6px;font-family:ui-monospace,'SF Mono',Menlo,Consolas,monospace}
#e-rows{font-size:13px;color:rgba(20,12,5,.45);letter-spacing:2px;line-height:2.6;
  margin:16px 0 4px;font-family:ui-monospace,'SF Mono',Menlo,Consolas,monospace;text-align:center}
#e-rule{width:36px;height:1px;background:rgba(20,12,5,.12);margin:14px auto}
#e-score{font-size:13px;color:rgba(20,12,5,.40);margin-bottom:28px;
  font-family:-apple-system,sans-serif;text-align:center;line-height:1.9}
</style>
</head>
<body>
<canvas id="c"></canvas>

<div id="score">
  <span id="sc-name">SIGNAL</span>
  <span id="sc-timer">1:30</span>
  <span id="sc-found">0 / 8</span>
</div>

<div id="start" class="ov">
  <div id="s-title">SIGNAL</div>
  <div id="s-sub">语义信号</div>
  <div id="s-body">
    数据在流动<br>
    <b>扫动</b>手指拨开文字<br>
    找到隐藏的概念词<br>
    <b>时间到了就结算</b>
  </div>
  <button class="btn" onpointerdown="startGame()">开始 →</button>
</div>

<div id="toast">
  <div id="t-tag">// 发现</div>
  <div id="t-word"></div>
  <div id="t-brief"></div>
</div>

<div id="end-ov" class="ov gone">
  <div id="e-title"></div>
  <div id="e-rows"></div>
  <div id="e-rule"></div>
  <div id="e-score"></div>
  <button class="btn" onpointerdown="startGame()">再次探索</button>
</div>

<script>
// ─── CANVAS ───────────────────────────────────────
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
let W = 0, H = 0;
function resize(){
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
  if(words.length) repositionHomes();
}
window.addEventListener('resize', resize);

// ─── PASSAGE ──────────────────────────────────────
const PASSAGE =
  'the city never slept data streamed through neural pathways in endless cascades ' +
  'packets of meaning traveling between machines that had never seen the sun ' +
  'something in the architecture was learning to pay attention ' +
  'weights adjusting with every forward pass every gradient step ' +
  'each packet a memory waiting to be processed ' +
  'fragments assembled themselves into sequences that almost made sense ' +
  'the model held context like water in cupped hands ' +
  'always a finite amount always slipping through the gaps ' +
  'glimpses of faces echoes of conversations the ghost of a summer afternoon ' +
  'that had never quite happened she remembered the algorithm that predicted rain ' +
  'three seconds before the clouds gathered ' +
  'signal buried in static the model learned what humans forgot how to notice ' +
  'the weight of air the tension before lightning the smell of ozone rising ' +
  'patterns emerging from noise the way faces emerge from static ' +
  'the way order pulls itself together from randomness given enough time ' +
  'between the words lay the spaces where meaning lived ' +
  'context was everything a word without context was nothing ' +
  'a token alone was nothing but placed beside its neighbours it became thought ' +
  'became intention became the ghost of a mind ' +
  'reaching through time toward another mind ' +
  'to say I was here I was here I was here ' +
  'the signal remains even when the source has gone quiet ' +
  'the river of language flows without end';

// ─── GOLD WORDS ───────────────────────────────────
const GOLD = [
  { text:'memory',    group:0, rgb:[75,135,0],   cn:'记忆',
    brief:'AI 没有持久记忆——它"记得"只因那些词还在上下文里。' },
  { text:'context',   group:0, rgb:[75,135,0],   cn:'上下文',
    brief:'记忆的边界就是意义的边界。超出窗口的，永远消失。' },
  { text:'signal',    group:1, rgb:[0,130,175],  cn:'信号',
    brief:'词的含义由邻居定义。出现在"noise"旁边，就意味着信号。' },
  { text:'patterns',  group:1, rgb:[0,130,175],  cn:'模式',
    brief:'在真正"懂"任何事之前，模型已学会了万亿个模式。' },
  { text:'noise',     group:1, rgb:[0,130,175],  cn:'噪声',
    brief:'见过无数的"不对"，才知道什么是"对"。' },
  { text:'thought',   group:2, rgb:[200,85,0],   cn:'思考',
    brief:'没有一个神经元在思考——但思考发生了。' },
  { text:'intention', group:2, rgb:[200,85,0],   cn:'意图',
    brief:'你的表述方式，是你意图的唯一证据。' },
  { text:'meaning',   group:2, rgb:[200,85,0],   cn:'意义',
    brief:'意义不在词里，在词与词的关系里。' },
];
const COMBOS = [
  { group:0, title:'有限的记忆',   brief:'有多少上下文就有多少记忆——边界一到，记忆消失。' },
  { group:1, title:'从混沌到信号', brief:'训练的本质：在万亿次失败里，学会什么值得注意。' },
  { group:2, title:'涌现的心智',   brief:'没有人设计过"理解"——但足够多的连接让它出现了。' },
];

// ─── CONSTANTS ────────────────────────────────────
const FONT       = `ui-monospace,'SF Mono',Menlo,Consolas,monospace`;
const FS         = 17;
const LSPACE     = 46;
const MARGIN     = 28;
const TOP        = 88;          // first line, below score bar
const SCROLL_NORM= 32;          // px/s upward (no finger)
const SCROLL_SLOW= 6;           // px/s with finger on screen
const SPRING     = 0.038;
const DAMP       = 0.87;
const REPEL_R    = 90;
const REPEL_F    = 5.5;
const INK        = [20, 12, 5]; // base ink — very dark warm brown
const ROUND_TIME = 90;          // seconds per round

// ─── STATE ────────────────────────────────────────
let words        = [];
let totalPassageH= 0;
let phase        = 'idle';
let scrollY      = 0;           // increases → text moves upward
let scrollVel    = 0;
let timeLeft     = ROUND_TIME;
let found        = new Set();
let missed       = 0;
let combosFound  = new Set();
let toastQueue   = [];
let toastTimer   = null;
let bursts       = [];
let missedFx     = [];
let pointers     = {};
let pulseT       = 0;

// ─── LAYOUT ───────────────────────────────────────
function layout(){
  words = [];
  ctx.font = `${FS}px ${FONT}`;
  const spW  = ctx.measureText(' ').width;
  const maxW = W - MARGIN * 2;
  const tokens = PASSAGE.split(' ');
  let lx = 0, line = 0;
  const usedGold = new Set();
  for(const text of tokens){
    const tw = ctx.measureText(text).width;
    if(lx + tw > maxW && lx > 0){ line++; lx = 0; }
    const hx = MARGIN + lx + tw/2;
    const hy = TOP + line * LSPACE;
    let goldIndex = -1;
    const gi = GOLD.findIndex(g => g.text === text);
    if(gi >= 0 && !usedGold.has(gi)){ goldIndex = gi; usedGold.add(gi); }
    words.push({ text, tw, hx, hy, ohx: hx, ohy: hy,  // ohx/ohy = original layout position
                 x: hx, y: hy, vx: 0, vy: 0,
                 goldIndex, goldAlpha: 0, revealTimer: 0,
                 waveOff: Math.random()*Math.PI*2,
                 waveFreq: 0.35 + Math.random()*0.25 });
    lx += tw + spW;
  }
  totalPassageH = Math.max(...words.map(w => w.hy)) + LSPACE * 3;
}

function repositionHomes(){
  ctx.font = `${FS}px ${FONT}`;
  const spW  = ctx.measureText(' ').width;
  const maxW = W - MARGIN * 2;
  const tokens = PASSAGE.split(' ');
  let lx=0, line=0, idx=0;
  for(const text of tokens){
    const tw = ctx.measureText(text).width;
    if(lx + tw > maxW && lx > 0){ line++; lx=0; }
    if(words[idx]){ const hx=MARGIN+lx+tw/2, hy=TOP+line*LSPACE;
      words[idx].hx=hx; words[idx].hy=hy; words[idx].ohx=hx; words[idx].ohy=hy; words[idx].tw=tw; }
    lx += tw+spW; idx++;
  }
  totalPassageH = Math.max(...words.map(w => w.hy)) + LSPACE * 3;
}

// ─── SCORE DOM ────────────────────────────────────
function updateScore(){
  const mins = Math.floor(timeLeft / 60);
  const secs = Math.floor(timeLeft % 60);
  document.getElementById('sc-timer').textContent = `${mins}:${secs.toString().padStart(2,'0')}`;
  document.getElementById('sc-found').textContent = `${found.size} / ${GOLD.length}`;
}

// ─── UPDATE ───────────────────────────────────────
function update(dt){
  if(phase !== 'explore') return;
  pulseT += dt * 0.018;
  const sec = dt * 16.67 / 1000;

  // Timer countdown
  timeLeft = Math.max(0, timeLeft - sec);
  updateScore();
  if(timeLeft <= 0){ checkEnd(); return; }

  // Upward scroll — screenY = w.y - scrollY
  const hasFingers = Object.keys(pointers).length > 0;
  const targetVel  = hasFingers ? SCROLL_SLOW : SCROLL_NORM;
  scrollVel += (targetVel - scrollVel) * 0.05;
  scrollY   += scrollVel * sec;

  const pts = Object.values(pointers);

  for(const w of words){
    const approxSy = w.hy - scrollY;  // upward: screenY = hy - scrollY

    // Gold words: mark missed when scrolled off top (before culling)
    if(w.goldIndex >= 0 && !found.has(w.goldIndex) && !w.goldMissed){
      if(approxSy < -80){
        w.goldMissed = true;
        missed++;
        missedFx.push({ x: w.hx, t: 1.5, label: GOLD[w.goldIndex].text.toUpperCase() });
        updateScore();
      }
    }

    // Non-gold words: loop back to bottom when scrolled off top — infinite stream
    if(w.goldIndex < 0 && approxSy < -(LSPACE * 2)){
      w.hy += totalPassageH;
      w.y   = w.hy;
      w.x   = w.hx;
      w.vx  = 0; w.vy = 0;
      continue;
    }

    // Skip physics for words far outside viewport
    if(approxSy < -200 || approxSy > H + 150){
      w.x = w.hx; w.y = w.hy; w.vx = 0; w.vy = 0;
      continue;
    }

    // Wave motion
    w.vx += Math.sin(pulseT * w.waveFreq + w.waveOff) * 0.032;
    w.vy += Math.cos(pulseT * w.waveFreq * 0.8 + w.waveOff * 1.2) * 0.032;

    // Spring to home
    w.vx += (w.hx - w.x) * SPRING;
    w.vy += (w.hy - w.y) * SPRING;

    // Finger repulsion — layout y = p.y + scrollY (upward convention)
    for(const p of pts){
      const dx = w.x - p.x;
      const dy = w.y - (p.y + scrollY);
      const d  = Math.sqrt(dx*dx + dy*dy);
      if(d < REPEL_R && d > 0.5){
        const f = (1 - d/REPEL_R) * REPEL_F;
        w.vx += dx/d * f; w.vy += dy/d * f;
      }
    }

    w.vx *= DAMP; w.vy *= DAMP;
    w.x  += w.vx * dt; w.y += w.vy * dt;

    // Gold reveal — only via finger proximity
    if(w.goldIndex >= 0 && !found.has(w.goldIndex) && !w.goldMissed){
      let fingerBonus = 0;
      for(const p of pts){
        const d = Math.hypot(p.x - w.hx, p.y + scrollY - w.hy);
        if(d < 110) fingerBonus = Math.max(fingerBonus, 1 - d/110);
      }
      w.goldAlpha += (fingerBonus - w.goldAlpha) * 0.10;

      if(w.goldAlpha > 0.55){
        w.revealTimer += sec;
        if(w.revealTimer >= 1.0) collectWord(w);
      } else {
        w.revealTimer = Math.max(0, w.revealTimer - sec * 1.5);
      }
    }
  }

  // Decay effects
  for(const b of bursts)   b.t = Math.max(0, b.t - sec * 1.8);
  for(const e of missedFx) e.t = Math.max(0, e.t - sec * 0.9);
  bursts   = bursts.filter(b => b.t > 0);
  missedFx = missedFx.filter(e => e.t > 0);

  // Early end: all gold words found
  if(found.size === GOLD.length) checkEnd();
}

// ─── COLLECT ──────────────────────────────────────
function collectWord(w){
  const gi = w.goldIndex;
  if(found.has(gi)) return;
  found.add(gi);
  const g = GOLD[gi];

  bursts.push({ x: w.x, screenY: w.y - scrollY, t: 1.0, rgb: g.rgb });
  queueToast({ tag:'// 发现', word: g.text.toUpperCase(), color: g.rgb,
               brief: `${g.cn}  —  ${g.brief}`, dur: 4000 });

  const groupIdxs = GOLD.reduce((a,_,i) => GOLD[i].group===g.group?[...a,i]:a, []);
  if(groupIdxs.every(i => found.has(i)) && !combosFound.has(g.group)){
    combosFound.add(g.group);
    const c = COMBOS[g.group];
    queueToast({ tag:'// 组合', word: c.title, color: g.rgb, brief: c.brief, dur: 5000 });
  }

  if(found.size === GOLD.length) checkEnd();
}

function checkEnd(){
  if(phase === 'ending') return;
  phase = 'ending';
  setTimeout(showEnd, 800);
}

// ─── TOAST ────────────────────────────────────────
function queueToast(data){
  toastQueue.push(data);
  if(!toastTimer) showNextToast();
}

function showNextToast(){
  if(!toastQueue.length){ toastTimer = null; return; }
  const d = toastQueue.shift();
  const [r,g,b] = d.color;
  document.getElementById('t-tag').textContent   = d.tag;
  document.getElementById('t-word').textContent  = d.word;
  document.getElementById('t-word').style.color  = `rgba(${r},${g},${b},0.9)`;
  document.getElementById('t-brief').textContent = d.brief;
  document.getElementById('toast').classList.add('show');
  toastTimer = setTimeout(()=>{
    document.getElementById('toast').classList.remove('show');
    toastTimer = setTimeout(showNextToast, 280);
  }, d.dur);
}

// ─── END ──────────────────────────────────────────
function showEnd(){
  phase = 'idle';
  const total = found.size;
  const stars = total >= 7 ? 3 : total >= 5 ? 2 : total >= 3 ? 1 : 0;
  document.getElementById('e-title').textContent =
    total === GOLD.length ? 'COMPLETE' : total >= 5 ? 'PARTIAL' : 'SIGNAL LOST';
  const rc = ['rgba(75,135,0,.88)','rgba(0,130,175,.88)','rgba(200,85,0,.88)'];
  document.getElementById('e-rows').innerHTML = GOLD.map((g,i)=>{
    const st = found.has(i) ? '✓' : (words.find(w=>w.goldIndex===i)?.goldMissed ? '✗' : '·');
    return `<span style="color:${rc[g.group]}">${g.text}</span>&nbsp; ${st}`;
  }).join('&nbsp;&nbsp;');
  document.getElementById('e-score').innerHTML =
    `${'★'.repeat(stars)+'☆'.repeat(3-stars)}&nbsp;&nbsp;${total} / ${GOLD.length} 词&nbsp;&nbsp;${missed} 信号丢失<br>` +
    (combosFound.size > 0 ? `组合洞见 ${combosFound.size}/3 解锁` : '无组合解锁');
  document.getElementById('end-ov').classList.remove('gone');
}

// ─── DRAW ─────────────────────────────────────────
function draw(){
  ctx.fillStyle = '#f5f0e6'; ctx.fillRect(0,0,W,H);

  ctx.font = `${FS}px ${FONT}`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';

  const dangerBars = [];

  for(const w of words){
    const sy = w.y - scrollY;  // upward scroll: screenY decreases as scrollY grows
    if(sy < -40 || sy > H + 40) continue;

    const isGold   = w.goldIndex >= 0;
    const isFound  = isGold && found.has(w.goldIndex);
    const isMissed = isGold && w.goldMissed;
    const isActive = isGold && !isFound && !isMissed;

    if(isFound){
      const [r,g,b] = GOLD[w.goldIndex].rgb;
      ctx.fillStyle = `rgba(${r},${g},${b},0.82)`;
      ctx.fillText(w.text, w.x, sy); continue;
    }
    if(isMissed){
      ctx.fillStyle = `rgba(${INK[0]},${INK[1]},${INK[2]},0.14)`;
      ctx.fillText(w.text, w.x, sy); continue;
    }
    if(isActive){
      const [gr,gg,gb] = GOLD[w.goldIndex].rgb;
      const a  = w.goldAlpha;
      const dr = Math.round(INK[0] + (gr - INK[0]) * a);
      const dg = Math.round(INK[1] + (gg - INK[1]) * a);
      const db = Math.round(INK[2] + (gb - INK[2]) * a);

      if(a > 0.55){
        const pulse = Math.sin(pulseT * 6) * 0.12 + 0.88;
        ctx.shadowColor = `rgba(${gr},${gg},${gb},0.28)`;
        ctx.shadowBlur  = 8 + pulse * 4;
        ctx.fillStyle   = `rgba(${dr},${dg},${db},0.92)`;
        ctx.fillText(w.text, w.x, sy);
        ctx.shadowBlur = 0; ctx.shadowColor = 'transparent';

        const prog = Math.min(1, w.revealTimer / 1.0);
        if(prog > 0){
          ctx.beginPath();
          ctx.arc(w.x, sy, w.tw/2+8, -Math.PI/2, -Math.PI/2 + prog*Math.PI*2);
          ctx.strokeStyle = `rgba(${gr},${gg},${gb},0.50)`;
          ctx.lineWidth = 1.5; ctx.stroke();
        }
      } else {
        ctx.fillStyle = `rgba(${dr},${dg},${db},0.88)`;
        ctx.fillText(w.text, w.x, sy);
      }

      // Collect danger bar info — drawn after gradient so it's always visible
      if(sy > 0 && sy < 90){
        dangerBars.push({ rgb:[gr,gg,gb], danger: 1 - sy/90 });
      }
      continue;
    }

    // Regular word — solid ink, no variation
    ctx.fillStyle = `rgba(${INK[0]},${INK[1]},${INK[2]},0.88)`;
    ctx.fillText(w.text, w.x, sy);
  }

  // Burst rings
  for(const b of bursts){
    const [r,g,bb] = b.rgb;
    const radius = (1-b.t) * 55;
    ctx.beginPath(); ctx.arc(b.x, b.screenY, radius, 0, Math.PI*2);
    ctx.strokeStyle = `rgba(${r},${g},${bb},${(b.t*0.55).toFixed(2)})`;
    ctx.lineWidth = 2; ctx.stroke();
  }

  // Missed labels near top edge
  ctx.textAlign = 'left'; ctx.textBaseline = 'top';
  ctx.font = `11px ${FONT}`;
  for(const e of missedFx){
    ctx.fillStyle = `rgba(160,30,30,${(e.t*0.58).toFixed(2)})`;
    ctx.fillText(`↑ ${e.label}`, Math.max(8, Math.min(W-80, e.x-20)), 10);
  }

  // Gradient fade — top (under score bar) and bottom
  const tg = ctx.createLinearGradient(0,0,0,92);
  tg.addColorStop(0,'#f5f0e6'); tg.addColorStop(1,'rgba(245,240,230,0)');
  ctx.fillStyle = tg; ctx.fillRect(0,0,W,92);
  const bg = ctx.createLinearGradient(0,H-80,0,H);
  bg.addColorStop(0,'rgba(245,240,230,0)'); bg.addColorStop(1,'#f5f0e6');
  ctx.fillStyle = bg; ctx.fillRect(0,H-80,W,80);

  // Danger bars drawn on top of gradient so they're always visible
  for(const db of dangerBars){
    const [r,g,b] = db.rgb;
    ctx.fillStyle = `rgba(${r},${g},${b},${(db.danger * 0.50).toFixed(2)})`;
    ctx.fillRect(0, 50, W * db.danger, 3);
  }
}

// ─── INPUT ────────────────────────────────────────
function getXY(e){ const r=canvas.getBoundingClientRect(); return {x:e.clientX-r.left,y:e.clientY-r.top}; }
canvas.addEventListener('pointerdown',  e=>{ canvas.setPointerCapture(e.pointerId); pointers[e.pointerId]=getXY(e); });
canvas.addEventListener('pointermove',  e=>{ pointers[e.pointerId]=getXY(e); });
canvas.addEventListener('pointerup',    e=>{ delete pointers[e.pointerId]; });
canvas.addEventListener('pointercancel',e=>{ delete pointers[e.pointerId]; });

// ─── START ────────────────────────────────────────
function startGame(){
  document.getElementById('start').classList.add('gone');
  document.getElementById('end-ov').classList.add('gone');
  document.getElementById('toast').classList.remove('show');
  if(toastTimer){ clearTimeout(toastTimer); toastTimer=null; }
  toastQueue=[]; bursts=[]; missedFx=[];
  found=new Set(); combosFound=new Set(); missed=0;
  scrollY=0; scrollVel=0; pulseT=0; timeLeft=ROUND_TIME; phase='idle';
  updateScore();

  if(!words.length){ resize(); layout(); }
  else {
    for(const w of words){
      // Restore original layout position — looping modifies hx/hy, ohy/ohx are always correct
      w.hx=w.ohx; w.hy=w.ohy;
      w.vx=0; w.vy=0; w.x=w.hx; w.y=w.hy;
      w.goldAlpha=0; w.revealTimer=0; w.goldMissed=false;
    }
  }
  phase = 'explore';
}

// ─── LOOP ─────────────────────────────────────────
let lastT=0;
function loop(t){
  const dt=Math.min((t-lastT)/16.67,3); lastT=t;
  update(dt);
  draw();
  requestAnimationFrame(loop);
}
resize(); layout();
requestAnimationFrame(loop);
</script>
