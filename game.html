<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>STRING</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#07070e}
body{border-radius:24px;overflow:hidden}
#c{position:fixed;inset:0;touch-action:none;user-select:none;-webkit-tap-highlight-color:transparent}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
let W = 0, H = 0;

// ── TEXT ──────────────────────────────────────────
const PASSAGE =
  'the city never slept — data streamed through neural pathways in endless cascades ' +
  'each packet a memory waiting to be processed fragments assembled themselves ' +
  'glimpses of faces echoes of conversations the ghost of a summer afternoon ' +
  'that had never quite happened she remembered the algorithm that first predicted rain ' +
  'three seconds before the clouds gathered patterns emerging from noise ' +
  'signal buried in static the model learned what humans forgot how to notice ' +
  'the weight of air the tension before lightning the smell of ozone rising ' +
  'between the words lay the spaces where meaning lived context was everything ' +
  'a token alone was nothing but placed beside its neighbours it became thought ' +
  'became intention became the ghost of a mind reaching through time toward another mind ' +
  'to say I was here I was here I was here';

// ── LAYOUT PARAMS ────────────────────────────────
const FS      = 15;
const LSPACE  = 34;   // line height
const MARGIN  = 26;
const TOP     = 60;

// ── WORD OBJECTS ─────────────────────────────────
let words = [];

function layout(){
  words = [];
  ctx.font = `${FS}px 'Courier New',monospace`;
  const spW = ctx.measureText(' ').width;
  const maxW = W - MARGIN * 2;
  const tokens = PASSAGE.split(' ');

  let lx = 0, line = 0;
  for(const text of tokens){
    const tw = ctx.measureText(text).width;
    if(lx + tw > maxW && lx > 0){ line++; lx = 0; }
    const hx = MARGIN + lx + tw / 2;
    const hy = TOP + line * LSPACE;
    words.push({
      text, tw,
      hx, hy,          // home (center of word)
      x: hx, y: hy,    // current position
      vx: 0, vy: 0,
    });
    lx += tw + spW;
  }
}

function resize(){
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
  layout();
}
window.addEventListener('resize', resize);
resize();

// ── POINTER ───────────────────────────────────────
const REPEL_R = 90;    // repulsion radius
const REPEL_F = 5.5;   // repulsion force
const SPRING  = 0.038; // spring back to home
const DAMP    = 0.87;  // velocity damping

let pointers = {};  // active pointer positions
let grabbed   = null;  // { word, offX, offY }
let grabStart = { x:0, y:0, t:0 };

function getRepelPoints(){
  return Object.values(pointers);
}

canvas.addEventListener('pointerdown', e => {
  canvas.setPointerCapture(e.pointerId);
  const r  = canvas.getBoundingClientRect();
  const px = e.clientX - r.left;
  const py = e.clientY - r.top;
  pointers[e.pointerId] = { x:px, y:py };
  grabStart = { x:px, y:py, t:Date.now() };

  // Find word under finger to grab
  let best = null, bestD = 28;
  for(const w of words){
    const d = Math.hypot(w.x - px, w.y - py);
    if(d < bestD){ bestD = d; best = w; }
  }
  if(best){
    grabbed = { word:best, offX: px-best.x, offY: py-best.y };
  }
});

canvas.addEventListener('pointermove', e => {
  const r  = canvas.getBoundingClientRect();
  const px = e.clientX - r.left;
  const py = e.clientY - r.top;
  pointers[e.pointerId] = { x:px, y:py };

  if(grabbed && grabbed.word){
    grabbed.word.x = px - grabbed.offX;
    grabbed.word.y = py - grabbed.offY;
    grabbed.word.vx = 0;
    grabbed.word.vy = 0;
  }
});

canvas.addEventListener('pointerup', e => {
  const r  = canvas.getBoundingClientRect();
  const px = e.clientX - r.left;
  const py = e.clientY - r.top;

  if(grabbed){
    // Throw velocity based on distance from home
    const w = grabbed.word;
    w.vx = (px - grabStart.x) * 0.08;
    w.vy = (py - grabStart.y) * 0.08;
    grabbed = null;
  }
  delete pointers[e.pointerId];
});

canvas.addEventListener('pointercancel', e => {
  delete pointers[e.pointerId];
  grabbed = null;
});

// ── PHYSICS ───────────────────────────────────────
function update(){
  const pts = getRepelPoints();

  for(const w of words){
    if(grabbed && grabbed.word === w) continue;

    // Spring toward home
    w.vx += (w.hx - w.x) * SPRING;
    w.vy += (w.hy - w.y) * SPRING;

    // Repulsion from each pointer
    for(const p of pts){
      const dx = w.x - p.x;
      const dy = w.y - p.y;
      const d  = Math.sqrt(dx*dx + dy*dy);
      if(d < REPEL_R && d > 0.5){
        const f = (1 - d / REPEL_R) * REPEL_F;
        w.vx += (dx / d) * f;
        w.vy += (dy / d) * f;
      }
    }

    w.vx *= DAMP;
    w.vy *= DAMP;
    w.x  += w.vx;
    w.y  += w.vy;
  }
}

// ── DRAW ──────────────────────────────────────────
function draw(){
  ctx.fillStyle = '#07070e';
  ctx.fillRect(0, 0, W, H);

  ctx.font = `${FS}px 'Courier New',monospace`;
  ctx.textAlign    = 'center';
  ctx.textBaseline = 'middle';

  for(const w of words){
    // Displacement from home → brightness
    const disp  = Math.hypot(w.x - w.hx, w.y - w.hy);
    const speed = Math.hypot(w.vx, w.vy);
    const t     = Math.min(1, disp / 60 + speed * 0.12);
    const alpha = 0.28 + t * 0.62;

    // Words near grabbed word glow slightly
    let r=235, g=235, b=255;
    if(t > 0.3){
      // Shift toward lime when displaced
      r = 235 + (200-235)*t*t;
      g = 235 + (255-235)*t*t;
      b = 255 + (80 -255)*t*t;
    }

    ctx.fillStyle = `rgba(${r|0},${g|0},${b|0},${alpha.toFixed(2)})`;
    ctx.fillText(w.text, w.x, w.y);
  }
}

// ── LOOP ──────────────────────────────────────────
function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
