<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>AGENT://STRING</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;font-family:'Courier New',Courier,monospace;background:#08080f}
body{border-radius:24px;overflow:hidden}
#c{position:fixed;inset:0;touch-action:none;user-select:none;-webkit-tap-highlight-color:transparent}
/* HUD */
#hud{position:fixed;inset:0;pointer-events:none;z-index:2}
#hud-tl{position:absolute;top:18px;left:20px;font-size:11px;letter-spacing:3px;color:rgba(160,160,185,.55);line-height:1.9}
#hud-tr{position:absolute;top:18px;right:20px;text-align:right;font-size:11px;letter-spacing:2px;color:rgba(160,160,185,.55);line-height:1.9}
#hud-bl{position:absolute;bottom:22px;left:50%;transform:translateX(-50%);font-size:11px;letter-spacing:2px;color:rgba(200,255,80,.45);white-space:nowrap;pointer-events:auto}
/* Submit button — only shows when 4 selected */
#btn-submit{display:none;position:fixed;bottom:60px;left:50%;transform:translateX(-50%);
  font-family:'Courier New',monospace;font-size:12px;letter-spacing:5px;
  color:rgba(200,255,80,1);border:1px solid rgba(200,255,80,.5);background:transparent;
  padding:14px 36px;z-index:5;touch-action:none;-webkit-tap-highlight-color:transparent;outline:none}
/* Overlays */
.overlay{position:fixed;inset:0;z-index:10;display:flex;flex-direction:column;align-items:center;
  justify-content:center;background:#08080f;transition:opacity .4s}
.overlay.gone{opacity:0;pointer-events:none}
#s-title{font-size:clamp(14px,3.5vw,24px);font-weight:400;color:rgba(255,255,255,.75);letter-spacing:10px;margin-bottom:10px}
#s-sub{font-size:11px;color:rgba(160,160,185,.35);letter-spacing:4px;margin-bottom:12px}
#s-rule{width:36px;height:1px;background:rgba(255,255,255,.08);margin:20px auto 32px}
#s-how{font-size:12px;color:rgba(160,160,185,.4);line-height:2;text-align:center;margin-bottom:44px;font-family:-apple-system,sans-serif;letter-spacing:.5px}
.btn{font-family:'Courier New',monospace;font-size:11px;letter-spacing:5px;
  color:rgba(200,255,80,.65);border:1px solid rgba(200,255,80,.2);background:transparent;
  padding:14px 32px;cursor:pointer;touch-action:none;-webkit-tap-highlight-color:transparent;outline:none}
/* End overlay */
#cmp{text-align:center;max-width:340px;padding:0 24px}
#cmp-kw{font-size:clamp(20px,5vw,32px);font-weight:400;letter-spacing:7px;color:rgba(200,255,80,.9);margin-bottom:6px}
#cmp-rule{width:36px;height:1px;background:rgba(255,255,255,.1);margin:16px auto}
#cmp-body{font-size:13px;color:rgba(180,180,205,.5);line-height:1.9;margin-bottom:28px;font-family:-apple-system,sans-serif}
#cmp-btns{display:flex;gap:14px;justify-content:center}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hud">
  <div id="hud-tl"></div>
  <div id="hud-tr"></div>
  <div id="hud-bl"></div>
</div>
<button id="btn-submit" onpointerdown="submitGuess()">SUBMIT ▶</button>

<!-- START -->
<div id="start" class="overlay">
  <div id="s-title">AGENT :// STRING</div>
  <div id="s-sub">语义空间实验</div>
  <div id="s-rule"></div>
  <div id="s-how">
    词语漂浮在空间中<br>
    找出 4 个语义相关的词<br>
    点击选中，凑够 4 个后提交<br>
    猜对：它们结晶成簇<br>
    猜错：扣一条命（共 4 条）
  </div>
  <button class="btn" onpointerdown="startGame()">ENTER →</button>
</div>

<!-- END -->
<div id="cmp-overlay" class="overlay gone">
  <div id="cmp">
    <div id="cmp-kw"></div>
    <div id="cmp-rule"></div>
    <div id="cmp-body"></div>
    <div id="cmp-btns">
      <button class="btn" onpointerdown="restartGame()">AGAIN</button>
    </div>
  </div>
</div>

<script>
// ── CANVAS ────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
let W = 0, H = 0;
function resize(){ W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
window.addEventListener('resize', resize); resize();

const ACCENT = 'rgba(200,255,80,';
const DIM    = 'rgba(160,160,185,';
const WHITE  = 'rgba(255,255,255,';

// ── WORD DATA — two rounds ─────────────────────────
// Round 1: clear groupings
const ROUND1 = [
  { id:'SENSE',  col:'rgba(200,255,80,',  label:'感知',  words:['visual','audio','signal','sensor'] },
  { id:'THINK',  col:'rgba(255,160,80,',  label:'推理',  words:['reason','infer','plan','logic'] },
  { id:'STORE',  col:'rgba(80,200,255,',  label:'记忆',  words:['token','embed','buffer','vector'] },
  { id:'ACT',    col:'rgba(160,255,180,', label:'行动',  words:['call','tool','output','execute'] },
];
// Round 2: trickier
const ROUND2 = [
  { id:'SENSE',  col:'rgba(200,255,80,',  label:'感知',  words:['detect','encode','scan','observe'] },
  { id:'THINK',  col:'rgba(255,160,80,',  label:'推理',  words:['chain','reflect','decide','goal'] },
  { id:'STORE',  col:'rgba(80,200,255,',  label:'记忆',  words:['context','window','memory','store'] },
  { id:'ACT',    col:'rgba(160,255,180,', label:'行动',  words:['fetch','write','search','respond'] },
];

// ── GAME STATE ────────────────────────────────────
let words    = [];  // word objects
let lives    = 4;
let formed   = 0;   // groups completed
let selected = [];  // selected word objects (max 4)
let alive    = false;
let round    = 1;
let shaking  = [];  // words currently shaking
let feedback = { msg:'', t:0, good:false };

// ── WORD OBJECT ───────────────────────────────────
// { text, group, col, label, x, y, vx, vy, selected, formed, formT, shakeT, shakeOff }

function makeWords(groups){
  words=[]; selected=[];
  const all=[];
  for(const g of groups) for(const w of g.words)
    all.push({text:w, group:g.id, col:g.col, label:g.label});
  // shuffle
  for(let i=all.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));[all[i],all[j]]=[all[j],all[i]];
  }
  for(const d of all){
    let x,y,tries=0;
    do{
      x=70+Math.random()*(W-140);
      y=110+Math.random()*(H-230);
      tries++;
    } while(tries<50 && words.some(w=>Math.hypot(w.x-x,w.y-y)<85));
    words.push({
      ...d, x, y,
      vx:(Math.random()-.5)*.18, vy:(Math.random()-.5)*.18,
      selected:false, formed:false, formT:0,
      shakeT:0, shakeOff:0,
      tx:x, ty:y, // target when formed
    });
  }
}

// ── PHYSICS ───────────────────────────────────────
function updateWords(dt){
  for(const w of words){
    if(w.formed){
      // spring to target corner position
      w.vx += (w.tx - w.x) * .05;
      w.vy += (w.ty - w.y) * .05;
      w.vx *= .85; w.vy *= .85;
      w.x += w.vx*dt; w.y += w.vy*dt;
      w.formT = Math.min(1, w.formT + dt*.022);
      continue;
    }
    // shake
    if(w.shakeT > 0){
      w.shakeT = Math.max(0, w.shakeT - dt*.05);
      w.shakeOff = Math.sin(w.shakeT * 28) * 6 * (w.shakeT/1);
    } else { w.shakeOff = 0; }

    w.vx += (Math.random()-.5)*.018;
    w.vy += (Math.random()-.5)*.018;
    w.vx *= .986; w.vy *= .986;
    w.x += w.vx*dt; w.y += w.vy*dt;
    const pad=62;
    if(w.x<pad){w.x=pad;w.vx*=-.6;} if(w.x>W-pad){w.x=W-pad;w.vx*=-.6;}
    if(w.y<100){w.y=100;w.vy*=-.6;} if(w.y>H-90){w.y=H-90;w.vy*=-.6;}
  }
  // gentle repulsion between free words
  const free = words.filter(w=>!w.formed);
  for(let i=0;i<free.length;i++) for(let j=i+1;j<free.length;j++){
    const a=free[i],b=free[j];
    const dx=b.x-a.x+.01,dy=b.y-a.y,d=Math.sqrt(dx*dx+dy*dy);
    if(d<88&&d>.5){ const f=(1-d/88)*.025; a.vx-=dx/d*f;a.vy-=dy/d*f;b.vx+=dx/d*f;b.vy+=dy/d*f; }
  }
  if(feedback.t>0) feedback.t=Math.max(0,feedback.t-dt*.03);
}

// ── DRAW ──────────────────────────────────────────
function draw(){
  ctx.fillStyle='#08080f'; ctx.fillRect(0,0,W,H);

  // Formed cluster labels at bottom
  const formedGroups=[...new Set(words.filter(w=>w.formed).map(w=>w.group))];
  for(let fi=0;fi<formedGroups.length;fi++){
    const gid=formedGroups[fi];
    const g=(round===1?ROUND1:ROUND2).find(g=>g.id===gid);
    const {cx,cy}=cornerPos(fi);
    ctx.font='11px "Courier New",monospace';
    ctx.fillStyle=g.col+'.5)';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('['+g.label+' · '+g.id+']', cx, cy-26);
  }

  // Feedback flash
  if(feedback.t>0){
    const a=Math.min(1,feedback.t)*.9;
    ctx.font='bold 14px "Courier New",monospace';
    ctx.fillStyle=(feedback.good?'rgba(200,255,80,':'rgba(255,80,80,')+a+')';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(feedback.msg, W/2, H*0.44);
  }

  // Words
  ctx.textAlign='center'; ctx.textBaseline='middle';
  for(const w of words){
    const ox = w.shakeOff;
    let fs, alpha, col;
    if(w.formed){
      fs=17; alpha=.2+w.formT*.55; col=w.col;
    } else if(w.selected){
      fs=18; alpha=.95; col=w.col;
    } else {
      fs=16; alpha=.45; col=WHITE;
    }
    ctx.font=`${fs}px "Courier New",monospace`;
    ctx.fillStyle=col+alpha+')';
    ctx.fillText(w.text, w.x+ox, w.y);

    // Selection ring
    if(w.selected && !w.formed){
      const tw=ctx.measureText(w.text).width;
      ctx.strokeStyle=w.col+'.6)'; ctx.lineWidth=1.5;
      ctx.strokeRect(w.x+ox-tw/2-8, w.y-12, tw+16, 24);
    }
  }

  // Bottom separator line when clusters start forming
  if(formedGroups.length>0){
    ctx.strokeStyle=DIM+'.07)'; ctx.lineWidth=.5;
    ctx.beginPath(); ctx.moveTo(0,H-58); ctx.lineTo(W,H-58); ctx.stroke();
  }
}

function cornerPos(i){
  const cols=4, margin=W*.12, step=(W-margin*2)/3;
  return { cx: margin+i*step, cy: H-32 };
}

// ── SELECTION + SUBMIT ─────────────────────────────
function tapWord(wx, wy){
  if(!alive) return;
  // Find tapped word (generous radius)
  let best=null, bestD=44;
  for(const w of words){
    if(w.formed) continue;
    const d=Math.hypot(wx-w.x, wy-w.y);
    if(d<bestD){ bestD=d; best=w; }
  }
  if(!best) return;

  if(best.selected){
    best.selected=false;
    selected=selected.filter(s=>s!==best);
  } else {
    if(selected.length>=4) return;
    best.selected=true;
    selected.push(best);
  }
  updateSubmitBtn();
}

function updateSubmitBtn(){
  document.getElementById('btn-submit').style.display = selected.length===4 ? 'block' : 'none';
}

function submitGuess(){
  if(selected.length!==4||!alive) return;
  // Check if all same group
  const g=selected[0].group;
  const correct=selected.every(w=>w.group===g);
  if(correct){
    // Success
    const fi=[...new Set(words.filter(w=>w.formed).map(w=>w.group))].length;
    const gDef=(round===1?ROUND1:ROUND2).find(d=>d.id===g);
    for(let i=0;i<selected.length;i++){
      const {cx,cy}=cornerPos(fi);
      selected[i].formed=true; selected[i].formT=0;
      selected[i].tx=cx+(i-1.5)*26; selected[i].ty=cy;
    }
    formed++;
    feedback={msg:`[ ${gDef.label} · ${g} ] ✓`, t:1.4, good:true};
    selected=[];
    updateSubmitBtn();
    if(formed>=4) setTimeout(()=>endGame(true),1200);
  } else {
    // Wrong
    lives--;
    for(const w of selected){ w.shakeT=1; w.selected=false; }
    selected=[];
    updateSubmitBtn();
    // Check near-miss: how many same group?
    const gc={};
    for(const w of [...selected]) gc[w.group]=(gc[w.group]||0)+1;
    feedback={msg:'× 不是同一类', t:1.2, good:false};
    updateHUD();
    if(lives<=0) setTimeout(()=>endGame(false),600);
  }
  updateHUD();
}

// ── HUD ───────────────────────────────────────────
function hud(tl,tr,bl){
  document.getElementById('hud-tl').innerHTML=tl.replace(/\n/g,'<br>');
  document.getElementById('hud-tr').innerHTML=tr;
  document.getElementById('hud-bl').innerHTML=bl||'';
}

function updateHUD(){
  const hearts='♥'.repeat(lives)+'♡'.repeat(Math.max(0,4-lives));
  const prog=`${formed} / 4 clusters`;
  hud(`R${round} · CLUSTER\n${hearts}`, prog, selected.length>0?`已选 ${selected.length} / 4`:'点击词语选中');
}

// ── GAME FLOW ─────────────────────────────────────
function startGame(){
  document.getElementById('start').classList.add('gone');
  round=1; lives=4; formed=0; selected=[];
  makeWords(ROUND1);
  alive=true;
  updateHUD();
}

function restartGame(){
  document.getElementById('cmp-overlay').classList.add('gone');
  round=1; lives=4; formed=0; selected=[];
  makeWords(ROUND1);
  alive=true;
  updateHUD();
  document.getElementById('btn-submit').style.display='none';
}

function endGame(win){
  alive=false;
  document.getElementById('btn-submit').style.display='none';
  if(win && round===1){
    // Advance to round 2
    round=2; lives=4; formed=0; selected=[];
    document.getElementById('cmp-kw').textContent='ROUND 1 CLEAR';
    document.getElementById('cmp-body').textContent='基础语义空间已解析。第二轮词汇更模糊——同样的四个维度，但边界更难判断。';
    document.getElementById('cmp-overlay').classList.remove('gone');
    // Override AGAIN button to start R2
    document.querySelector('#cmp-btns .btn').textContent='R2 →';
    document.querySelector('#cmp-btns .btn').setAttribute('onpointerdown','startRound2()');
  } else if(win && round===2){
    document.getElementById('cmp-kw').textContent='COMPLETE';
    document.getElementById('cmp-body').textContent='你在向量空间中识别出了 8 个语义簇。这就是 embedding 的本质：意义相近的词，在高维空间里距离更近。';
    document.getElementById('cmp-overlay').classList.remove('gone');
    document.querySelector('#cmp-btns .btn').textContent='AGAIN';
    document.querySelector('#cmp-btns .btn').setAttribute('onpointerdown','restartGame()');
  } else {
    document.getElementById('cmp-kw').textContent='GAME OVER';
    document.getElementById('cmp-body').textContent='命用尽。语义空间依然在等待被理解。';
    document.getElementById('cmp-overlay').classList.remove('gone');
    document.querySelector('#cmp-btns .btn').textContent='RETRY';
    document.querySelector('#cmp-btns .btn').setAttribute('onpointerdown','restartGame()');
  }
}

function startRound2(){
  document.getElementById('cmp-overlay').classList.add('gone');
  lives=4; formed=0; selected=[];
  makeWords(ROUND2);
  alive=true;
  updateHUD();
  document.getElementById('btn-submit').style.display='none';
}

// ── INPUT ─────────────────────────────────────────
canvas.addEventListener('pointerdown', e => {
  if(!alive) return;
  const r = canvas.getBoundingClientRect();
  tapWord(e.clientX-r.left, e.clientY-r.top);
});

// ── MAIN LOOP ─────────────────────────────────────
let lastT=0;
function loop(t){
  const dt=Math.min((t-lastT)/16.67,3); lastT=t;
  updateWords(dt);
  draw();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
