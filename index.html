<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>SIGNAL</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Courier+Prime&family=DM+Mono:wght@400;500&family=Fira+Mono:wght@400;500&family=IBM+Plex+Mono:wght@400;500&family=Inconsolata:wght@400;500&family=JetBrains+Mono:wght@400;500&family=Martian+Mono:wght@400&family=Roboto+Mono:wght@400;500&family=Space+Mono:wght@400;700&family=VT323&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#f5f0e6}
body{border-radius:24px;overflow:hidden}
#c{position:fixed;inset:0;touch-action:none;user-select:none;-webkit-tap-highlight-color:transparent}

.ov{position:fixed;inset:0;z-index:10;display:flex;flex-direction:column;align-items:center;
    justify-content:center;background:#f5f0e6;transition:opacity .4s;
    user-select:none;-webkit-user-select:none}
.ov.gone{opacity:0;pointer-events:none}

.ov-inner{display:flex;flex-direction:column;align-items:center;width:min(320px,88vw)}
.ov-label{font-size:10px;letter-spacing:6px;color:rgba(20,12,5,.28);
  font-family:ui-monospace,'SF Mono',Menlo,Consolas,monospace;text-align:center}
.ov-bigtitle{font-size:clamp(44px,11vw,64px);letter-spacing:14px;color:rgba(20,12,5,.82);
  font-family:ui-monospace,'SF Mono',Menlo,Consolas,monospace;line-height:1;text-align:center}
.ov-rule{width:100%;height:1px;background:rgba(20,12,5,.13);margin:18px 0}
.ov-body{font-size:12px;letter-spacing:2px;color:rgba(20,12,5,.38);line-height:2.4;text-align:center;
  font-family:ui-monospace,'SF Mono',Menlo,Consolas,monospace}
.btn-main{font-family:ui-monospace,'SF Mono',Menlo,Consolas,monospace;font-size:11px;letter-spacing:5px;
  color:rgba(20,12,5,.72);border:1px solid rgba(20,12,5,.28);background:transparent;
  padding:14px 36px;cursor:pointer;touch-action:none;outline:none;-webkit-tap-highlight-color:transparent;
  margin-top:10px;width:100%}
.btn-ghost{font-family:ui-monospace,'SF Mono',Menlo,Consolas,monospace;font-size:11px;letter-spacing:5px;
  color:rgba(20,12,5,.30);border:none;background:transparent;
  padding:12px 36px;cursor:pointer;touch-action:none;outline:none;-webkit-tap-highlight-color:transparent;
  margin-top:4px}
#s-rank-btn{display:block;margin:14px auto 0;width:38px;height:38px;border-radius:50%;border:none;
  background:rgba(20,12,5,.07);font-size:18px;cursor:pointer;
  touch-action:none;outline:none;-webkit-tap-highlight-color:transparent;}
#s-rank-btn:active{background:rgba(20,12,5,.14);transform:scale(.9)}
#font-switcher{display:flex;align-items:center;gap:10px;margin-top:18px;cursor:pointer;
  -webkit-tap-highlight-color:transparent;touch-action:none}
#font-switcher span{font-size:10px;letter-spacing:3px;color:rgba(20,12,5,.28)}
#font-name{font-size:11px;letter-spacing:2px;color:rgba(20,12,5,.50)}

#score{position:fixed;top:0;left:0;right:0;z-index:15;display:flex;align-items:center;
  padding:13px 16px 18px;font-family:ui-monospace,'SF Mono',Menlo,Consolas,monospace;
  font-size:12px;letter-spacing:2px;pointer-events:none;
  background:linear-gradient(to bottom,#f5f0e6 52%,rgba(245,240,230,0))}
#sc-level{flex:1;color:rgba(20,12,5,.28)}
#sc-timer{color:rgba(20,12,5,.62);margin-right:16px}
#sc-found{color:rgba(20,12,5,.52)}

#toast{position:fixed;top:54px;left:14px;right:14px;z-index:15;
  background:#f5f0e6;border-radius:10px;padding:13px 15px 14px;pointer-events:none;
  opacity:0;transform:translateY(-8px);transition:opacity .22s,transform .22s;
  border:1px solid rgba(20,12,5,.28)}
#toast.show{opacity:1;transform:translateY(0)}
#t-tag{font-size:11px;letter-spacing:5px;color:rgba(20,12,5,.35);
  font-family:ui-monospace,'SF Mono',Menlo,Consolas,monospace;margin-bottom:6px}
#t-word{font-size:22px;letter-spacing:8px;
  font-family:ui-monospace,'SF Mono',Menlo,Consolas,monospace;margin-bottom:6px}
#t-brief{font-size:14px;color:rgba(20,12,5,.62);line-height:1.7;font-family:-apple-system,sans-serif}

#e-title{font-size:clamp(18px,4.5vw,26px);letter-spacing:10px;color:rgba(20,12,5,.40);
  font-family:ui-monospace,'SF Mono',Menlo,Consolas,monospace;text-align:center}
#e-frac{font-size:clamp(54px,14vw,80px);letter-spacing:6px;color:rgba(20,12,5,.84);
  font-family:ui-monospace,'SF Mono',Menlo,Consolas,monospace;line-height:1;
  text-align:center;margin:4px 0 0}
#e-pts{font-size:10px;letter-spacing:4px;color:rgba(20,12,5,.25);text-align:center;
  font-family:ui-monospace,'SF Mono',Menlo,Consolas,monospace;margin:2px 0 0}
#e-rows{display:flex;flex-wrap:wrap;justify-content:center;gap:5px 12px;
  max-width:300px;font-family:ui-monospace,'SF Mono',Menlo,Consolas,monospace}
#e-rows span{font-size:12px;letter-spacing:1px;white-space:nowrap}
#e-score{font-size:10px;letter-spacing:3px;color:rgba(20,12,5,.30);text-align:center;
  font-family:ui-monospace,'SF Mono',Menlo,Consolas,monospace;line-height:2.2}
.e-btns{display:flex;flex-direction:column;align-items:center;width:100%}

/* ── Leaderboard ── */
#lb-tabs{display:none;width:100%;margin-bottom:0}
.lb-tab{flex:1;font-family:ui-monospace,'SF Mono',Menlo,Consolas,monospace;font-size:10px;
  letter-spacing:3px;color:rgba(20,12,5,.28);border:none;background:transparent;
  padding:10px 0;cursor:pointer;touch-action:none;outline:none;-webkit-tap-highlight-color:transparent;
  border-bottom:1px solid rgba(20,12,5,.10)}
.lb-tab.active{color:rgba(20,12,5,.72);border-bottom:1px solid rgba(20,12,5,.50)}
#lb-list{width:100%;max-height:42vh;overflow-y:auto;padding:2px 0}
.lb-row{display:flex;align-items:center;gap:10px;padding:7px 0;
  border-bottom:1px solid rgba(20,12,5,.06)}
.lb-rank{font-family:ui-monospace,'SF Mono',Menlo,Consolas,monospace;font-size:11px;
  color:rgba(20,12,5,.28);width:24px;text-align:center;flex-shrink:0}
.lb-av{width:26px;height:26px;border-radius:50%;background:rgba(20,12,5,.08);
  display:flex;align-items:center;justify-content:center;font-size:11px;
  color:rgba(20,12,5,.38);flex-shrink:0;overflow:hidden}
.lb-av img{width:100%;height:100%;object-fit:cover}
.lb-name{flex:1;font-family:ui-monospace,'SF Mono',Menlo,Consolas,monospace;font-size:12px;
  letter-spacing:1px;color:rgba(20,12,5,.60);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.lb-score{font-family:ui-monospace,'SF Mono',Menlo,Consolas,monospace;font-size:12px;
  letter-spacing:1px;color:rgba(20,12,5,.70);flex-shrink:0}
.lb-me .lb-name,.lb-me .lb-score{color:rgba(20,12,5,.90);font-weight:500}
#lb-status{font-family:ui-monospace,'SF Mono',Menlo,Consolas,monospace;font-size:11px;
  letter-spacing:3px;color:rgba(20,12,5,.22);text-align:center;padding:22px 0}
</style>
</head>
<body>
<canvas id="c"></canvas>

<div id="score">
  <span id="sc-level">L1</span>
  <span id="sc-timer">1:30</span>
  <span id="sc-found">0 / 8</span>
</div>

<div id="start" class="ov">
  <div class="ov-inner">
    <div class="ov-label" id="s-label"></div>
    <div class="ov-rule"></div>
    <div class="ov-bigtitle">SIGNAL</div>
    <div class="ov-rule"></div>
    <div class="ov-body" id="s-body"></div>
    <div class="ov-rule"></div>
    <button class="btn-main" id="s-begin" onpointerdown="startGame()"></button>
    <button id="s-rank-btn" onpointerdown="showLeaderboard()">🏆</button>
    <div id="font-switcher" onpointerdown="cycleFont()">
      <span>← →</span><span id="font-name"></span>
    </div>
  </div>
</div>

<div id="toast">
  <div id="t-tag">// 发现</div>
  <div id="t-word"></div>
  <div id="t-brief"></div>
</div>

<div id="end-ov" class="ov gone">
  <div class="ov-inner">
    <div class="ov-label" id="e-lv"></div>
    <div class="ov-rule"></div>
    <div id="e-title"></div>
    <div id="e-frac"></div>
    <div id="e-pts">PTS</div>
    <div class="ov-rule"></div>
    <div id="e-rows"></div>
    <div class="ov-rule"></div>
    <div id="e-score"></div>
    <div class="e-btns">
      <button class="btn-main" id="e-next" onpointerdown="nextLevel()">下 一 关 →</button>
      <button class="btn-ghost" id="e-retry" onpointerdown="startGame()">再 来 一 次</button>
    </div>
  </div>
</div>

<div id="lb-ov" class="ov gone">
  <div class="ov-inner">
    <div class="ov-label" id="lb-label"></div>
    <div class="ov-rule"></div>
    <div class="ov-bigtitle" style="font-size:clamp(30px,7vw,44px);letter-spacing:10px">RANK</div>
    <div class="ov-rule"></div>
    <div id="lb-tabs">
      <button class="lb-tab active" id="lb-tab-global" onpointerdown="switchLbTab('global')">GLOBAL</button>
      <button class="lb-tab" id="lb-tab-friends" onpointerdown="switchLbTab('friends')">FRIENDS</button>
    </div>
    <div id="lb-status"></div>
    <div id="lb-list"></div>
    <div class="ov-rule"></div>
    <button class="btn-ghost" id="lb-back" onpointerdown="hideLeaderboard()"></button>
  </div>
</div>

<script>

// ─────────────────────────────────────────────────────────────────────────────

function t(key,n){ const v=I18N[locale][key]; return typeof v==='function'?v(n):v; }
function renderI18n(){
  document.getElementById('s-label').textContent      = t('start.label');
  document.getElementById('s-body').innerHTML         = t('start.body').replace('\n','<br>');
  document.getElementById('s-begin').textContent      = t('start.begin');

  applyFont();
}

// ─────────────────────────────────────────────────────────────────────────────
//  AUDIO
// ─────────────────────────────────────────────────────────────────────────────
let _actx = null;
function actx(){
  if(!_actx) _actx = new (window.AudioContext||window.webkitAudioContext)();
  return _actx;
}
function resumeAudio(){ try{ if(_actx && _actx.state==='suspended') _actx.resume(); }catch(e){} }

// Primitive tone: freq, waveform, peak volume, attack, decay, start-offset(s)
function _tone(freq, type, vol, atk, dec, t0=0){
  const a=actx(), now=a.currentTime;
  const osc=a.createOscillator(), g=a.createGain();
  osc.connect(g); g.connect(a.destination);
  osc.type=type; osc.frequency.setValueAtTime(freq, now+t0);
  g.gain.setValueAtTime(0, now+t0);
  g.gain.linearRampToValueAtTime(vol, now+t0+atk);
  g.gain.exponentialRampToValueAtTime(0.0001, now+t0+atk+dec);
  osc.start(now+t0); osc.stop(now+t0+atk+dec+0.05);
}

// Short noise burst (white noise shaped by exponential decay)
function _noise(vol, dur, t0=0){
  const a=actx(), now=a.currentTime;
  const buf=a.createBuffer(1,Math.ceil(a.sampleRate*dur),a.sampleRate);
  const d=buf.getChannelData(0);
  for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.exp(-i/(a.sampleRate*dur*0.25));
  const src=a.createBufferSource(), g=a.createGain();
  src.buffer=buf; src.connect(g); g.connect(a.destination);
  g.gain.value=vol; src.start(now+t0);
}

// ── Sound events ──────────────────────────────────────────────────────────────

// Gold word collected — bell arpeggio, pitch per group
const _COLLECT_FREQS = [[1047,1319,1568],[880,1109,1319],[784,988,1175]];
function sfxCollect(group){
  _COLLECT_FREQS[group%3].forEach((f,i)=>_tone(f,'sine',0.16,0.004,0.38,i*0.06));
}

// Trap hit — low thud + mid buzz + noise crunch
function sfxTrap(){
  _tone(55,'sine',0.55,0.004,0.28);
  _tone(160,'sawtooth',0.22,0.001,0.10);
  _noise(0.40,0.18);
}

// Streak bonus — ascending ping sequence (more pings = bigger streak)
function sfxStreak(count){
  const steps=Math.min(count,7);
  for(let i=0;i<steps;i++) _tone(440*Math.pow(1.2,i),'sine',0.13,0.004,0.22,i*0.07);
}

// Surge warning — 3 quick electric beeps
function sfxSurge(){
  [0,0.13,0.26].forEach(t=>_tone(1200,'square',0.06,0.004,0.08,t));
}

// Combo unlock — sparkle cascade
function sfxCombo(){
  [1047,1319,1568,2093].forEach((f,i)=>_tone(f,'sine',0.14,0.003,0.30,i*0.05));
}

// Game end
function sfxComplete(){ [523,659,784,1047].forEach((f,i)=>_tone(f,'sine',0.17,0.01,0.6,i*0.12)); }
function sfxPartial(){  [523,659].forEach((f,i)=>_tone(f,'sine',0.15,0.01,0.55,i*0.14)); }
function sfxLost(){     [440,370,311].forEach((f,i)=>_tone(f,'sine',0.14,0.01,0.55,i*0.15)); }

// Time extension — ascending bright chime
function sfxTime(){ [659,880,1109].forEach((f,i)=>_tone(f,'sine',0.15,0.005,0.40,i*0.08)); }

// Penalty hit — low buzz + noise
function sfxPenalty(){ _tone(180,'sawtooth',0.28,0.002,0.20); _tone(130,'square',0.14,0.001,0.15,0.04); _noise(0.22,0.12,0.02); }

//  INFINITE LEVEL GENERATOR
//  After L3, levels cycle through the 3 passages with increasing difficulty.
//  tier = floor(n/3): 0=handcrafted, 1=hard, 2=brutal, 3=void...
// ─────────────────────────────────────────────────────────────────────────────
const GEN_NAMES = ['ECHO','FLUX','SURGE','STORM','VOID+','CHAOS','FRAG','DEEP+'];
const GEN_DESCS_ZH = ['信号重启','频率偏移','峰值涌现','噪声暴风','虚空解码','混沌映射','碎片风暴','核心剥离'];
const GEN_DESCS_EN = ['Signal Reboot','Frequency Shift','Peak Surge','Noise Storm','Void Decode','Chaos Map','Fragment Storm','Core Stripped'];

function generateLevel(n){
  const src   = LEVELS[n % 3];
  const tier  = Math.floor(n / 3); // tier 1 starts at L4
  const gen   = (n - 3);           // 0-indexed within generated levels

  // Unlock more traps each tier
  const trapCount = Math.min(src.allTrapKeys.length, src.trapKeys.length + tier);
  const trapKeys  = src.allTrapKeys.slice(0, trapCount);

  // Geometry disturbers: tier1=1, tier2=2, tier3=3...
  const geomCount    = Math.min(tier, 4);
  const geomStrength = 1.0 + (tier - 1) * 0.8;

  // Shorter time, faster scroll, min time 30s
  const time       = Math.max(30, src.time - (tier - 1) * 8);
  const scrollNorm = Math.min(Math.round(src.scrollNorm * (1 + (tier - 1) * 0.22)), 200);
  const scrollSlow = Math.min(Math.round(src.scrollSlow * (1 + (tier - 1) * 0.22)), 38);

  // Speed surge: tier1=every 28s, tier2=every 18s, tier3+=every 12s
  const surgeInterval = tier >= 1 ? Math.max(10, 30 - (tier - 1) * 8) : 0;
  const surgeSpeed    = Math.min(scrollNorm * (3.5 + tier * 0.5), 400);
  const surgeDuration = Math.min(1.2 + tier * 0.35, 3.0);

  const nameIdx = gen % GEN_NAMES.length;
  return {
    ...src,
    label:      `L${n + 1}`,
    name:       GEN_NAMES[nameIdx],
    desc:       GEN_DESCS_ZH[nameIdx],
    en_desc:    GEN_DESCS_EN[nameIdx],
    time, scrollNorm, scrollSlow,
    trapKeys, geomCount, geomStrength,
    surgeInterval, surgeSpeed, surgeDuration,
    generated: true,
  };
}

let currentLevel = 0;
function getLevel(n)  { return n < LEVELS.length ? LEVELS[n] : generateLevel(n); }
function lvCFG()      { return getLevel(currentLevel); }
function lvFS()       { return lvCFG().fs; }

const GLITCH_CHARS = '!@#$%^&*~<>[]{}?|01_';
function glitchText(text, seed){
  let out = '';
  for(let i=0;i<text.length;i++) out += GLITCH_CHARS[(Math.floor(seed)+i*7)%GLITCH_CHARS.length];
  return out;
}

//  PASSAGE PARSING
// ─────────────────────────────────────────────────────────────────────────────
function flatPassageTokens(passage){
  const tokens = [];
  for(const raw of passage.split('\n')){
    if(raw.trim()==='') continue;
    for(const t of raw.trim().split(/\s+/)) if(t) tokens.push(t);
  }
  return tokens;
}

function computePositions(cfg){
  const { passage, layoutMode, fs, lspace, margin } = cfg;
  ctx.font = `${fs}px ${FONT()}`;
  const spW = ctx.measureText(' ').width;
  const positions = [];
  const rawLines  = passage.split('\n');
  let lineN = 0;

  if(layoutMode === 'prose'){
    let lx = 0;
    const maxW = W - margin * 2;
    for(const raw of rawLines){
      if(raw.trim()===''){
        if(lx > 0){ lineN++; lx = 0; }
        lineN += 0.55; continue;
      }
      for(const text of raw.trim().split(/\s+/).filter(Boolean)){
        const tw = ctx.measureText(text).width;
        if(lx + tw > maxW && lx > 0){ lineN++; lx = 0; }
        positions.push({ hx: margin + lx + tw/2, hy: TOP + lineN * lspace, tw });
        lx += tw + spW;
      }
    }
  } else if(layoutMode === 'stream'){
    const colW = Math.min(W * 0.62, 310);
    for(const raw of rawLines){
      if(raw.trim()===''){lineN += 0.6; continue;}
      const isInd = raw.startsWith('\t');
      const indent = isInd ? 22 : 0;
      const lm = margin + indent;
      const avail = colW - indent;
      let lx = 0;
      for(const text of raw.trim().split(/\s+/).filter(Boolean)){
        const tw = ctx.measureText(text).width;
        if(lx + tw > avail && lx > 0){ lineN++; lx = 0; }
        positions.push({ hx: lm + lx + tw/2, hy: TOP + lineN * lspace, tw });
        lx += tw + spW;
      }
      lineN++;
    }
  } else if(layoutMode === 'verse'){
    for(const raw of rawLines){
      if(raw.trim()===''){lineN += 0.8; continue;}
      const tokens = raw.trim().split(/\s+/).filter(Boolean);
      const totalW = tokens.reduce((s,t) => s + ctx.measureText(t).width + spW, -spW);
      let lx = Math.max(margin, (W - totalW) / 2);
      for(const text of tokens){
        const tw = ctx.measureText(text).width;
        positions.push({ hx: lx + tw/2, hy: TOP + lineN * lspace, tw });
        lx += tw + spW;
      }
      lineN++;
    }
  }
  return positions;
}

//  LAYOUT
// ─────────────────────────────────────────────────────────────────────────────
function layout(){
  const cfg      = lvCFG();
  const passage  = lvPASSAGE();
  const positions= computePositions({...cfg, passage});
  const tokens   = flatPassageTokens(passage);
  const usedGold = new Set(), usedTrap = new Set();
  words = [];
  for(let i=0; i<tokens.length; i++){
    const text = tokens[i];
    const { hx, hy, tw } = positions[i] || { hx:0, hy:0, tw:10 };
    let goldIndex=-1, trapWord=false;
    const gi = lvGOLD().findIndex(g=>g.text===text);
    if(gi>=0 && !usedGold.has(gi)){ goldIndex=gi; usedGold.add(gi); }
    const ti = cfg.trapKeys.indexOf(text);
    if(ti>=0 && !usedTrap.has(ti) && goldIndex<0){ trapWord=true; usedTrap.add(ti); }
    words.push({
      text, tw, hx, hy, ohx:hx, ohy:hy,
      x:hx, y:hy, vx:0, vy:0,
      goldIndex, trapWord,
      goldAlpha:0, revealTimer:0, goldMissed:false,
      trapAlpha:0, trapTimer:0, trapTriggered:false,
      scrambleTimer:0, scrambleSeed:Math.random()*100,
      corrupted:false,
      waveOff:Math.random()*Math.PI*2, waveFreq:0.35+Math.random()*0.25,
    });
  }
  totalPassageH = Math.max(...words.map(w=>w.hy)) + lvLSPACE()*3;
}

function repositionHomes(){
  const cfg      = lvCFG();
  const positions= computePositions({...cfg, passage:lvPASSAGE()});
  for(let i=0; i<words.length && i<positions.length; i++){
    const { hx, hy, tw } = positions[i];
    words[i].hx=hx; words[i].hy=hy; words[i].ohx=hx; words[i].ohy=hy; words[i].tw=tw;
  }
  totalPassageH = Math.max(...words.map(w=>w.hy)) + lvLSPACE()*3;
}

// ─────────────────────────────────────────────────────────────────────────────
//  CANVAS RESIZE
// ─────────────────────────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
let W=0, H=0;

  H = canvas.height = window.innerHeight;

// ─────────────────────────────────────────────────────────────────────────────
//  GEOMETRIC DISTURBERS
//  Shapes float in screen-space, pushing words out of position.
//  Their repulsion uses layout-space coordinates (screen y + scrollY).
// ─────────────────────────────────────────────────────────────────────────────
const GEOM_TYPES = ['circle','ring','diamond'];

function spawnGeom(){
  const cfg   = lvCFG();
  const str   = cfg.geomStrength || 1.0;
  // Size: bimodal — mostly small/medium, occasional large/huge
  const roll = Math.random();
  const size = roll < 0.35 ? 10 + Math.random()*18      // tiny: 10–28
             : roll < 0.70 ? 28 + Math.random()*36      // medium: 28–64
             : roll < 0.90 ? 70 + Math.random()*50      // large: 70–120
             :               130 + Math.random()*70;    // huge: 130–200
  // Enter from a random screen edge
  const edge  = Math.floor(Math.random() * 4);
  let x, y, vx, vy;
  const spd = 18 + Math.random() * 22;
  if(edge===0){ x=Math.random()*W; y=-size*2; vx=(Math.random()-.5)*spd*.6; vy=spd; }
  else if(edge===1){ x=W+size*2; y=Math.random()*H; vx=-spd; vy=(Math.random()-.5)*spd*.6; }
  else if(edge===2){ x=Math.random()*W; y=H+size*2; vx=(Math.random()-.5)*spd*.6; vy=-spd; }
  else { x=-size*2; y=Math.random()*H; vx=spd; vy=(Math.random()-.5)*spd*.6; }

  geoms.push({
    x, y, vx, vy,
    type: GEOM_TYPES[Math.floor(Math.random()*GEOM_TYPES.length)],
    size,
    spin: Math.random()*Math.PI*2,
    spinV: (Math.random()-.5) * 0.015,
    repelR: size * 4.5,
    strength: str * (9 + Math.random() * 4),
    alive: true,
  });
}

function updateGeoms(sec){
  const cfg       = lvCFG();
  const target    = cfg.geomCount || 0;

  // Spawn up to target count
  while(geoms.length < target) spawnGeom();

  for(const g of geoms){
    g.x    += g.vx * sec;
    g.y    += g.vy * sec;
    g.spin += g.spinV;

    // Gentle scroll parallax — geoms drift upward with the text (at 20% speed)
    g.y -= scrollVel * sec * 0.20;

    // Soft bounce off screen edges instead of teleporting, keeps them in viewport
    if(g.x < -g.size*3 || g.x > W+g.size*3 || g.y < -g.size*3 || g.y > H+g.size*3){
      // Respawn from opposite edge
      g.alive = false;
    }

    // Apply repulsion to nearby words (in layout space)
    const gly = g.y + scrollY;
    for(const w of words){
      const dx = w.x - g.x, dy = w.y - gly;
      const d  = Math.sqrt(dx*dx + dy*dy);
      if(d < g.repelR && d > 0.5){
        const f = (1 - d/g.repelR) * g.strength;
        w.vx += dx/d * f; w.vy += dy/d * f;
      }
    }
  }
  geoms = geoms.filter(g=>g.alive);
}

function drawGeoms(){
  for(const g of geoms){
    ctx.save();
    ctx.translate(g.x, g.y);
    ctx.rotate(g.spin);

    ctx.strokeStyle = 'rgba(0,0,0,0.82)';
    ctx.lineWidth   = 1.5;

    if(g.type === 'circle'){
      ctx.beginPath(); ctx.arc(0, 0, g.size, 0, Math.PI*2);
      ctx.fillStyle = 'rgba(0,0,0,0.10)';
      ctx.fill(); ctx.stroke();
    } else if(g.type === 'ring'){
      ctx.beginPath(); ctx.arc(0, 0, g.size, 0, Math.PI*2); ctx.stroke();
      ctx.beginPath(); ctx.arc(0, 0, g.size*.55, 0, Math.PI*2); ctx.stroke();
    } else { // diamond
      const s = g.size;
      ctx.beginPath();
      ctx.moveTo(0,-s); ctx.lineTo(s*.65,0); ctx.lineTo(0,s); ctx.lineTo(-s*.65,0);
      ctx.closePath();
      ctx.fillStyle = 'rgba(0,0,0,0.08)';
      ctx.fill(); ctx.stroke();
    }
    ctx.restore();
  }
}

function updateScore(){
  const lv   = lvCFG();
  const mins = Math.floor(timeLeft/60);
  const secs = Math.floor(timeLeft%60);
  const coreIdxs  = coreGoldIndices();
  const coreFound = coreIdxs.filter(i=>found.has(i)).length;
  document.getElementById('sc-level').textContent = lapCount>0?`${lv.label} ×${lapCount+1}`:lv.label;
  document.getElementById('sc-timer').textContent = `${mins}:${secs.toString().padStart(2,'0')}`;
  document.getElementById('sc-found').textContent = `${score}  ${coreFound}/${coreIdxs.length}`;
}

// ─────────────────────────────────────────────────────────────────────────────
//  TRAP TRIGGER
// ─────────────────────────────────────────────────────────────────────────────
function triggerTrap(w){
  w.trapTriggered = true; trapHits++;
  streak = 0;
  screenShake = Math.min(1.0, screenShake + 0.7);
  signalHealth = Math.max(0, signalHealth - 1);
  trapFontTimer = 1.8;
  sfxTrap();
  // In generated levels: trap also triggers a mini surge
  const cfg = lvCFG();
  if(cfg.generated && surgeState === 'idle'){
    surgeState = 'active';
    surgeTimer = (cfg.surgeDuration || 1.5) * 0.6; // shorter than normal surge
    surgeCountdown = (cfg.surgeInterval || 20) * (0.8 + Math.random() * 0.4);
  }
  bursts.push({ x:w.x, screenY:w.y-scrollY, t:1.0, rgb:[180,40,40], big:true });
  queueToast({ tag:t('toast.trap'), word:'ERROR', color:[180,40,40],
               brief:t('trap.brief'), dur:2500 });
  for(const ow of words){
    if(ow===w||ow.trapTriggered) continue;
    const d = Math.hypot(ow.x-w.x, ow.y-w.y);
    if(d < BLAST_R){
      const s = 1-d/BLAST_R;
      ow.scrambleTimer = SCRAMBLE_T*(0.6+s*0.7); ow.scrambleSeed=Math.random()*100;
      const ang=Math.atan2(ow.y-w.y, ow.x-w.x);
      ow.vx+=Math.cos(ang)*s*18; ow.vy+=Math.sin(ang)*s*18;
      if(ow.goldIndex>=0&&!found.has(ow.goldIndex)&&!ow.goldMissed){
        ow.corrupted=true; ow.goldAlpha=0; ow.revealTimer=0;
      }
    }
  }
}

// ─────────────────────────────────────────────────────────────────────────────
//  UPDATE
// ─────────────────────────────────────────────────────────────────────────────
function update(dt){
  if(phase!=='explore') return;
  pulseT += dt*0.018;
  const sec = dt*16.67/1000;

  timeLeft = Math.max(0, timeLeft-sec);
  updateScore();
  if(timeLeft<=0){ checkEnd(); return; }

  screenShake  = Math.max(0, screenShake - sec*2.8);
  trapFontTimer = Math.max(0, trapFontTimer - sec);

  const cfg = lvCFG();
  const hasFingers = Object.keys(pointers).length > 0;

  // ── Speed surge state machine ──────────────────────────────────────────────
  if(cfg.surgeInterval){
    surgeCountdown -= sec;
    if(surgeCountdown <= 0 && surgeState === 'idle'){
      surgeState = 'warn';
      surgeTimer = 0.45;
      surgeCountdown = cfg.surgeInterval * (0.85 + Math.random() * 0.3);
      sfxSurge();
      queueToast({ tag:t('toast.warn'), word:'SURGE', color:[180,40,40],
                   brief:t('surge.brief'), dur:1000 });
    }
    if(surgeState === 'warn'){
      surgeTimer -= sec;
      if(surgeTimer <= 0){ surgeState = 'active'; surgeTimer = cfg.surgeDuration; }
    }
  }
  // Active timer applies to ALL levels (including word-triggered surges in L1-L3)
  if(surgeState === 'active'){
    surgeTimer -= sec;
    if(surgeTimer <= 0) surgeState = 'idle';
  }

  // ── Scroll velocity ────────────────────────────────────────────────────────
  if(surgeState === 'active'){
    scrollVel += (cfg.surgeSpeed - scrollVel) * 0.18;
  } else {
    const targetVel = hasFingers ? cfg.scrollSlow : cfg.scrollNorm;
    scrollVel += (targetVel - scrollVel) * 0.05;
  }
  scrollY += scrollVel * sec;

  updateGeoms(sec);

  const pts = Object.values(pointers);

  for(const w of words){
    const approxSy = w.hy-scrollY;

    // ── Miss marker (core gold only) ────────────────────────────────────────
    if(w.goldIndex>=0 && !found.has(w.goldIndex) && !w.goldMissed && approxSy < -80){
      const _g=lvGOLD()[w.goldIndex];
      if(!_g.type||_g.type==='gold'){
        w.goldMissed=true; missed++;
        missedFx.push({ x:w.hx, t:1.5, label:_g.text.toUpperCase() });
        updateScore();
      }
    }

    // ── Word recycling ───────────────────────────────────────────────────────
    if(approxSy < -(lvLSPACE()*2)){
      if(w.goldIndex>=0){
        const _g=lvGOLD()[w.goldIndex];
        const isCore=!_g.type||_g.type==='gold';
        if(isCore && !found.has(w.goldIndex)){
          // Unfound core gold: cycle back (player gets another chance)
          w.goldMissed=false; w.goldAlpha=0; w.revealTimer=0; w.corrupted=false;
          w.hy+=totalPassageH; w.y=w.hy; w.x=w.hx; w.vx=0; w.vy=0; continue;
        } else if(!isCore){
          // Time/penalty: always cycle — can be collected again
          found.delete(w.goldIndex); w.goldAlpha=0; w.revealTimer=0; w.goldMissed=false; w.corrupted=false;
          w.hy+=totalPassageH; w.y=w.hy; w.x=w.hx; w.vx=0; w.vy=0; continue;
        }
        // Found core gold: stays put until lap reset pushes it forward
      } else if(w.trapTriggered){
        // Triggered trap: recycle so it can fire again
        w.trapTriggered=false; w.trapAlpha=0; w.trapTimer=0;
        w.hy+=totalPassageH; w.y=w.hy; w.x=w.hx; w.vx=0; w.vy=0; continue;
      } else if(!w.trapWord){
        // Regular word: recycle
        w.hy+=totalPassageH; w.y=w.hy; w.x=w.hx; w.vx=0; w.vy=0; continue;
      }
      // Untriggered trap: stays in place
    }

    if(approxSy < -200 || approxSy > H+150){
      w.x=w.hx; w.y=w.hy; w.vx=0; w.vy=0; continue;
    }

    if(w.scrambleTimer>0){
      w.scrambleTimer=Math.max(0, w.scrambleTimer-sec);
      if(w.scrambleTimer<=0) w.corrupted=false;
    }

    w.vx += Math.sin(pulseT*w.waveFreq+w.waveOff)*0.032;
    w.vy += Math.cos(pulseT*w.waveFreq*0.8+w.waveOff*1.2)*0.032;
    w.vx += (w.hx-w.x)*SPRING; w.vy += (w.hy-w.y)*SPRING;

    for(const p of pts){
      const dx=w.x-p.x, dy=w.y-(p.y+scrollY);
      const d=Math.sqrt(dx*dx+dy*dy);
      if(d<REPEL_R&&d>0.5){ const f=(1-d/REPEL_R)*REPEL_F; w.vx+=dx/d*f; w.vy+=dy/d*f; }
    }
    w.vx*=DAMP; w.vy*=DAMP; w.x+=w.vx*dt; w.y+=w.vy*dt;

    if(w.goldIndex>=0&&!found.has(w.goldIndex)&&!w.goldMissed&&!w.corrupted){
      let bonus=0;
      for(const p of pts){ const d=Math.hypot(p.x-w.hx,p.y+scrollY-w.hy); if(d<140) bonus=Math.max(bonus,1-d/140); }
      w.goldAlpha+=(bonus-w.goldAlpha)*0.22;
      if(w.goldAlpha>0.42){ w.revealTimer+=sec; if(w.revealTimer>=0.42) collectWord(w); }
      else w.revealTimer=Math.max(0, w.revealTimer-sec*0.6);
    }

    if(w.trapWord&&!w.trapTriggered){
      let bonus=0;
      for(const p of pts){ const d=Math.hypot(p.x-w.hx,p.y+scrollY-w.hy); if(d<120) bonus=Math.max(bonus,1-d/120); }
      w.trapAlpha+=(bonus-w.trapAlpha)*0.18;
      if(w.trapAlpha>0.45){ w.trapTimer+=sec; if(w.trapTimer>=0.28) triggerTrap(w); }
      else w.trapTimer=Math.max(0, w.trapTimer-sec*2.0);
    }
  }

  for(const b of bursts)   b.t=Math.max(0,b.t-sec*(b.big?1.4:b.flash?3.5:1.2));
  for(const e of missedFx) e.t=Math.max(0,e.t-sec*0.9);
  bursts  =bursts.filter(b=>b.t>0);
  missedFx=missedFx.filter(e=>e.t>0);
}

// ─────────────────────────────────────────────────────────────────────────────
//  COLLECT
// ─────────────────────────────────────────────────────────────────────────────
function collectWord(w){
  const gi=w.goldIndex; if(found.has(gi)) return;
  found.add(gi);
  const g=lvGOLD()[gi];

  // ── Friend word ──────────────────────────────────────────────────────────
  if(g.type==='friend'){
    timeLeft+=10; score+=25; streak++;
    sfxTime();
    bursts.push({ x:w.x, screenY:w.y-scrollY, t:1.0, rgb:g.rgb });
    bursts.push({ x:w.x, screenY:w.y-scrollY, t:1.0, rgb:g.rgb, flash:true });
    queueToast({ tag:t('toast.friend'), word:g.text.toUpperCase(), color:g.rgb,
                 brief:locale==='zh'?`好友信号 — ${g.text} 出现了！+10s +25分`:`signal from ${g.text} — +10s  +25 pts`,
                 dur:4500 });
    updateScore(); return;
  }

  // ── Time extension word ──────────────────────────────────────────────────
  if(g.type==='time'){
    const add=g.addTime||15;
    timeLeft+=add;
    score+=5;
    sfxTime();
    bursts.push({ x:w.x, screenY:w.y-scrollY, t:1.0, rgb:g.rgb });
    bursts.push({ x:w.x, screenY:w.y-scrollY, t:1.0, rgb:g.rgb, flash:true });
    queueToast({ tag:t('toast.time'), word:`+${add}S`, color:g.rgb,
                 brief:locale==='zh'?`${g.cn}  —  ${g.brief}`:g.en_brief, dur:3000 });
    updateScore(); return;
  }

  // ── Penalty word ─────────────────────────────────────────────────────────
  if(g.type==='penalty'){
    score=Math.max(0, score-10);
    timeLeft=Math.max(0, timeLeft-6);  // also costs 6 seconds
    sfxPenalty();
    screenShake=Math.min(1.0, screenShake+0.45);
    bursts.push({ x:w.x, screenY:w.y-scrollY, t:1.0, rgb:g.rgb, big:true });
    queueToast({ tag:t('toast.penalty'), word:'−10  −6S', color:g.rgb,
                 brief:locale==='zh'?`${g.cn}  —  ${g.brief}`:g.en_brief, dur:3000 });
    updateScore(); return;
  }

  // ── Core gold word ───────────────────────────────────────────────────────
  streak++; score+=10;
  sfxCollect(g.group);
  if(g.surge && surgeState==='idle'){
    surgeState='active'; surgeTimer=lvCFG().surgeDuration||1.4; sfxSurge();
  }
  bursts.push({ x:w.x, screenY:w.y-scrollY, t:1.0, rgb:g.rgb });
  bursts.push({ x:w.x, screenY:w.y-scrollY, t:1.0, rgb:g.rgb, flash:true });
  queueToast({ tag:t('toast.found'), word:g.text.toUpperCase(), color:g.rgb,
               brief:locale==='zh'?`${g.cn}  —  ${g.brief}`:g.en_brief, dur:4000 });

  if(streak===3||streak===5||streak===7){
    sfxStreak(streak); score+=streak*5;
    if(signalHealth<4){ signalHealth=Math.min(4,signalHealth+1); }
    queueToast({ tag:t('toast.streak'), word:`×${streak}`, color:[200,160,20],
                 brief:t('streak.brief',streak), dur:3000 });
  }

  // Combo: only among core gold words of same group
  const gIdxs=lvGOLD().reduce((a,_,i)=>{
    const _g=lvGOLD()[i]; return _g.group===g.group&&(!_g.type||_g.type==='gold')?[...a,i]:a;
  },[]);
  if(gIdxs.every(i=>found.has(i))&&!combosFound.has(g.group)){
    combosFound.add(g.group); sfxCombo(); score+=30;
    const combo=lvCFG().combos[g.group];
    queueToast({ tag:t('toast.combo'),
                 word:locale==='zh'?combo.title:combo.en_title, color:g.rgb,
                 brief:locale==='zh'?combo.brief:combo.en_brief, dur:5000 });
  }

  updateScore();
  checkLap();
}

function checkEnd(){
  if(phase==='ending') return;
  phase='ending'; setTimeout(showEnd,800);
}

function checkLap(){
  const coreIdxs=coreGoldIndices();
  if(!coreIdxs.every(i=>found.has(i))) return;
  lapCount++;
  const bonus=20, pts=50+lapCount*10;
  timeLeft+=bonus;
  score+=pts;
  sfxComplete();
  queueToast({ tag:t('toast.lap'), word:`LAP ${lapCount}`, color:[200,160,20],
               brief:locale==='zh'?`圈完成 · +${bonus}s · +${pts}分`:`lap ${lapCount} complete · +${bonus}s · +${pts} pts`,
               dur:5000 });
  // Reset core gold words for next lap — push them forward one passage cycle
  coreIdxs.forEach(i=>{
    found.delete(i);
    const ww=words.find(w=>w.goldIndex===i);
    if(ww){ ww.goldAlpha=0; ww.revealTimer=0; ww.goldMissed=false; ww.corrupted=false; ww.hy+=totalPassageH; ww.y=ww.hy; }
  });
  updateScore();
}

// ─────────────────────────────────────────────────────────────────────────────
//  TOAST
// ─────────────────────────────────────────────────────────────────────────────
function queueToast(data){ toastQueue.push(data); if(!toastTimer) showNextToast(); }
function showNextToast(){
  if(!toastQueue.length){ toastTimer=null; return; }
  const d=toastQueue.shift();
  const [r,g,b]=d.color;
  document.getElementById('t-tag').textContent  =d.tag;
  document.getElementById('t-word').textContent =d.word;
  document.getElementById('t-word').style.color =`rgb(${r},${g},${b})`;
  document.getElementById('t-brief').textContent=d.brief;
  document.getElementById('toast').classList.add('show');
  toastTimer=setTimeout(()=>{
    document.getElementById('toast').classList.remove('show');
    toastTimer=setTimeout(showNextToast,280);
  },d.dur);
}

// ─────────────────────────────────────────────────────────────────────────────
//  END / NEXT LEVEL
// ─────────────────────────────────────────────────────────────────────────────
function showEnd(){
  phase='idle';
  const lv=lvCFG(), gold=lvGOLD();
  const coreIdxs=coreGoldIndices();
  const coreFound=coreIdxs.filter(i=>found.has(i)).length;
  const pct=coreFound/coreIdxs.length;
  if(lapCount>0||pct>=1) sfxComplete(); else if(pct>=0.375) sfxPartial(); else sfxLost();

  const lvDesc=locale==='zh'?lv.desc:(lv.en_desc||lv.desc);
  document.getElementById('e-lv').textContent=`${lv.label} · ${lv.name} · ${lvDesc}`;
  document.getElementById('e-title').textContent=
    lapCount>0?(lapCount>1?`${lapCount} LAPS`:'1 LAP'):
    pct>=1?'COMPLETE':pct>=0.375?'PARTIAL':'SIGNAL LOST';
  document.getElementById('e-frac').textContent=`${score}`;
  document.getElementById('e-rows').innerHTML=coreIdxs.map(i=>{
    const g=gold[i];
    const st=found.has(i)?'✓':(words.find(w=>w.goldIndex===i)?.goldMissed?'✗':'·');
    const dim=st==='·'?',0.25':',.85';
    return `<span style="color:rgba(${g.rgb[0]},${g.rgb[1]},${g.rgb[2]}${dim})">${g.text}&nbsp;${st}</span>`;
  }).join('');

  const parts=[];
  if(lapCount>0) parts.push(locale==='zh'?`${lapCount}圈`:`${lapCount} lap${lapCount>1?'s':''}`);
  if(missed>0) parts.push(t('end.missed',missed));
  if(trapHits>0) parts.push(t('end.blasted',trapHits));
  if(streak>=3) parts.push(t('end.streak',streak));
  if(combosFound.size>0) parts.push(t('end.combo',combosFound.size));
  document.getElementById('e-score').textContent=parts.join(' · ')||t('end.perfect');

  // Only allow advancing if player cleared at least half the core words or completed a lap
  const passed = lapCount > 0 || pct >= 0.5;
  document.getElementById('e-next').style.display = passed ? '' : 'none';
  document.getElementById('end-ov').classList.remove('gone');
  submitScore(score);
}

function nextLevel(){ currentLevel++; startGame(); }
function showLeaderboard(){ document.getElementById('lb-ov').classList.remove('gone'); }
function hideLeaderboard(){ document.getElementById('lb-ov').classList.add('gone'); }

// ─────────────────────────────────────────────────────────────────────────────
//  DRAW
// ─────────────────────────────────────────────────────────────────────────────
function draw(){
  // Screen shake transform
  ctx.save();
  if(screenShake > 0){
    ctx.translate(
      (Math.random()-.5)*screenShake*7,
      (Math.random()-.5)*screenShake*5
    );
  }

  ctx.fillStyle='#f5f0e6'; ctx.fillRect(0,0,W,H);

  // Geometric disturbers drawn under text
  drawGeoms();

  const fs=lvFS(), gold=lvGOLD();
  ctx.font=`${fs}px ${renderFont()}`; ctx.textAlign='center'; ctx.textBaseline='middle';

  const dangerBars=[];

  for(const w of words){
    const sy=w.y-scrollY;
    if(sy<-40||sy>H+40) continue;

    if(w.scrambleTimer>0){
      const fade=w.scrambleTimer<0.6?w.scrambleTimer/0.6:1;
      const chars=glitchText(w.text, pulseT*10+w.scrambleSeed);
      const jx=(Math.random()-.5)*4, jy=(Math.random()-.5)*3;
      ctx.fillStyle=`rgba(${TRAP_RGB[0]},${TRAP_RGB[1]},${TRAP_RGB[2]},${(fade*0.60).toFixed(2)})`;
      ctx.fillText(chars,w.x+jx,sy+jy); continue;
    }

    const isGold  =w.goldIndex>=0;
    const isFound =isGold&&found.has(w.goldIndex);
    const isMissed=isGold&&w.goldMissed;
    const isActive=isGold&&!isFound&&!isMissed;
    const isTrap  =w.trapWord&&!w.trapTriggered;

    if(isFound){
      const [r,g,b]=gold[w.goldIndex].rgb;
      ctx.fillStyle=`rgba(${r},${g},${b},0.82)`; ctx.fillText(w.text,w.x,sy); continue;
    }
    if(isMissed){
      ctx.fillStyle=`rgba(${INK[0]},${INK[1]},${INK[2]},0.14)`; ctx.fillText(w.text,w.x,sy); continue;
    }
    if(w.trapTriggered) continue;

    if(isActive){
      const [gr,gg,gb]=gold[w.goldIndex].rgb, a=w.goldAlpha;
      const dr=Math.round(INK[0]+(gr-INK[0])*a), dg=Math.round(INK[1]+(gg-INK[1])*a), db=Math.round(INK[2]+(gb-INK[2])*a);
      if(a>0.55){
        const pulse=Math.sin(pulseT*6)*0.12+0.88;
        ctx.shadowColor=`rgba(${gr},${gg},${gb},0.28)`; ctx.shadowBlur=8+pulse*4;
        ctx.fillStyle=`rgba(${dr},${dg},${db},0.92)`; ctx.fillText(w.text,w.x,sy);
        ctx.shadowBlur=0; ctx.shadowColor='transparent';
        const prog=Math.min(1,w.revealTimer/0.42);
        if(prog>0){
          ctx.beginPath(); ctx.arc(w.x,sy,w.tw/2+8,-Math.PI/2,-Math.PI/2+prog*Math.PI*2);
          ctx.strokeStyle=`rgba(${gr},${gg},${gb},0.50)`; ctx.lineWidth=1.5; ctx.stroke();
        }
      } else {
        ctx.fillStyle=`rgba(${dr},${dg},${db},0.88)`; ctx.fillText(w.text,w.x,sy);
      }
      if(sy>0&&sy<90) dangerBars.push({ rgb:[gr,gg,gb], danger:1-sy/90 });
      continue;
    }

    if(isTrap){
      const a=w.trapAlpha;
      const dr=Math.round(INK[0]+(TRAP_RGB[0]-INK[0])*a), dg=Math.round(INK[1]+(TRAP_RGB[1]-INK[1])*a), db=Math.round(INK[2]+(TRAP_RGB[2]-INK[2])*a);
      if(a>0.45){
        const flicker=Math.sin(pulseT*35)*0.22+0.78;
        ctx.fillStyle=`rgba(${dr},${dg},${db},${(0.90*flicker).toFixed(2)})`;
        const prog=Math.min(1,w.trapTimer/0.28);
        if(prog>0){
          ctx.beginPath(); ctx.arc(w.x,sy,w.tw/2+8,-Math.PI/2,-Math.PI/2+prog*Math.PI*2);
          ctx.strokeStyle=`rgba(${TRAP_RGB[0]},${TRAP_RGB[1]},${TRAP_RGB[2]},0.60)`; ctx.lineWidth=1.5; ctx.stroke();
        }
      } else {
        ctx.fillStyle=`rgba(${dr},${dg},${db},0.88)`;
      }
      ctx.fillText(w.text,w.x,sy);
      if(sy>0&&sy<90) dangerBars.push({ rgb:TRAP_RGB, danger:1-sy/90 });
      continue;
    }

    ctx.fillStyle=`rgba(${INK[0]},${INK[1]},${INK[2]},0.88)`;
    ctx.fillText(w.text,w.x,sy);
  }

  // Burst rings
  for(const b of bursts){
    const [r,g,bb]=b.rgb;
    if(b.big){
      const r1=(1-b.t)*90, r2=(1-b.t)*BLAST_R;
      ctx.beginPath(); ctx.arc(b.x,b.screenY,r1,0,Math.PI*2);
      ctx.strokeStyle=`rgba(${r},${g},${bb},${(b.t*0.70).toFixed(2)})`; ctx.lineWidth=3; ctx.stroke();
      ctx.beginPath(); ctx.arc(b.x,b.screenY,r2,0,Math.PI*2);
      ctx.strokeStyle=`rgba(${r},${g},${bb},${(b.t*0.30).toFixed(2)})`; ctx.lineWidth=1; ctx.stroke();
    } else if(b.flash){
      const radius=(1-b.t)*28;
      ctx.beginPath(); ctx.arc(b.x,b.screenY,radius,0,Math.PI*2);
      ctx.fillStyle=`rgba(${r},${g},${bb},${(b.t*0.40).toFixed(2)})`; ctx.fill();
    } else {
      const radius=(1-b.t)*80;
      ctx.beginPath(); ctx.arc(b.x,b.screenY,radius,0,Math.PI*2);
      ctx.strokeStyle=`rgba(${r},${g},${bb},${(b.t*0.60).toFixed(2)})`; ctx.lineWidth=2.5; ctx.stroke();
    }
  }

  // Missed labels
  ctx.textAlign='left'; ctx.textBaseline='top'; ctx.font=`11px ${renderFont()}`;
  for(const e of missedFx){
    ctx.fillStyle=`rgba(160,30,30,${(e.t*0.58).toFixed(2)})`;
    ctx.fillText(`↑ ${e.label}`, Math.max(8,Math.min(W-80,e.x-20)),10);
  }

  // Gradient fades
  const tg=ctx.createLinearGradient(0,0,0,92);
  tg.addColorStop(0,'#f5f0e6'); tg.addColorStop(1,'rgba(245,240,230,0)');
  ctx.fillStyle=tg; ctx.fillRect(0,0,W,92);
  const bg=ctx.createLinearGradient(0,H-80,0,H);
  bg.addColorStop(0,'rgba(245,240,230,0)'); bg.addColorStop(1,'#f5f0e6');
  ctx.fillStyle=bg; ctx.fillRect(0,H-80,W,80);

  // Danger bars
  for(const db of dangerBars){
    const [r,g,b]=db.rgb;
    ctx.fillStyle=`rgba(${r},${g},${b},${(db.danger*0.50).toFixed(2)})`;
    ctx.fillRect(0,50,W*db.danger,3);
  }

  // ── Surge overlay ────────────────────────────────────────────────────────
  if(surgeState === 'warn' || surgeState === 'active'){
    const pulse = surgeState === 'warn'
      ? Math.abs(Math.sin(pulseT * 80)) * 0.18   // rapid flash during warning
      : 0.10 + Math.abs(Math.sin(pulseT * 40)) * 0.06; // steady glow during surge
    // Red vignette on all four edges
    const vg = ctx.createRadialGradient(W/2, H/2, H*0.28, W/2, H/2, H*0.75);
    vg.addColorStop(0, `rgba(180,30,20,0)`);
    vg.addColorStop(1, `rgba(180,30,20,${pulse.toFixed(3)})`);
    ctx.fillStyle = vg; ctx.fillRect(0, 0, W, H);
  }

  ctx.restore(); // end screen shake
}

function getXY(e){ const r=canvas.getBoundingClientRect(); return {x:e.clientX-r.left,y:e.clientY-r.top}; }
canvas.addEventListener('pointerdown',  e=>{ resumeAudio(); canvas.setPointerCapture(e.pointerId); pointers[e.pointerId]=getXY(e); });
canvas.addEventListener('pointermove',  e=>{ pointers[e.pointerId]=getXY(e); });
canvas.addEventListener('pointerup',    e=>{ delete pointers[e.pointerId]; });
canvas.addEventListener('pointercancel',e=>{ delete pointers[e.pointerId]; });

// ─────────────────────────────────────────────────────────────────────────────
//  START
// ─────────────────────────────────────────────────────────────────────────────
function startGame(){
  document.getElementById('start').classList.add('gone');
  document.getElementById('end-ov').classList.add('gone');
  document.getElementById('toast').classList.remove('show');
  if(toastTimer){ clearTimeout(toastTimer); toastTimer=null; }
  toastQueue=[]; bursts=[]; missedFx=[];
  found=new Set(); combosFound=new Set(); missed=0; trapHits=0;
  scrollY=0; scrollVel=0; pulseT=0;
  geoms=[]; screenShake=0; streak=0;
  surgeState='idle'; surgeTimer=0;
  signalHealth=4; trapFontTimer=0;
  score=0; lapCount=0;
  buildFriendInjection();
  // First surge delayed — give player time to settle in
  surgeCountdown = (lvCFG().surgeInterval || 99) * (0.6 + Math.random() * 0.4);
  timeLeft=lvCFG().time; phase='idle';
  updateScore();
  resize(); layout();
  phase='explore';
}

//  LOOP
// ─────────────────────────────────────────────────────────────────────────────
let lastT=0;
function loop(t){
  const dt=Math.min((t-lastT)/16.67,3); lastT=t;
  update(dt); draw();
  requestAnimationFrame(loop);
}
// ─────────────────────────────────────────────────────────────────────────────
//  LEADERBOARD
// ─────────────────────────────────────────────────────────────────────────────
const GAMES_API = 'https://games-api.xinghuan-yin.workers.dev';
const GAME_ID   = 'agent-string';

function getAigramContext(){
  const p = new URLSearchParams(window.location.search);
  const telegramId = p.get('telegram_id') ?? null;
  const raw        = p.get('api_origin');
  const apiOrigin  = raw ? decodeURIComponent(raw) : null;
  return { telegramId, apiOrigin, isInAigram: !!(telegramId && apiOrigin) };
}
const aigram = getAigramContext();

function _b64e(s){ return btoa(unescape(encodeURIComponent(s))); }
function _b64d(s){ return decodeURIComponent(escape(atob(s))); }

function callAigramAPI(url, method='GET', data=null){
  return new Promise((resolve,reject)=>{
    if(!aigram.isInAigram){ reject(new Error('not in aigram')); return; }
    const rid = Math.random().toString(36).slice(2);
    const msg = _b64e(JSON.stringify({ url, method, data, request_id:rid, emitter:window.location.origin }));
    const timer = setTimeout(()=>{ window.removeEventListener('message',fn); reject(new Error('timeout')); }, 15000);
    function fn(e){
      if(typeof e.data!=='string'||!e.data.startsWith('callAPIResult-')) return;
      try{
        const r=JSON.parse(_b64d(e.data.slice('callAPIResult-'.length)));
        if(r.request_id!==rid) return;
        clearTimeout(timer); window.removeEventListener('message',fn);
        r.success ? resolve(r.data) : reject(new Error(r.error));
      }catch(_){}
    }
    window.addEventListener('message',fn);
    window.parent.postMessage(`callAPI-${msg}`, aigram.apiOrigin);
  });
}

let myId='', myName='', myAvatar='';
let friendPool=[]; // [{name, telegram_id}] — loaded async, injected at game start

async function loadUserInfo(){
  if(!aigram.isInAigram) return;
  myId = aigram.telegramId||'';
  try{
    const r = await callAigramAPI(`/note/telegram/user/get/info/by/telegram_id?telegram_id=${myId}`);
    const ud = r?.data ?? r;
    if(ud?.name){ myName=ud.name||''; myAvatar=ud.head_url||''; }
  }catch(_){}
}

async function loadFriends(){
  if(!aigram.isInAigram) return;
  const tid = aigram.telegramId; // use directly, don't depend on myId being set
  if(!tid) return;
  try{
    const res = await callAigramAPI(`/note/telegram/user/contact/list?telegram_id=${tid}`);
    const contacts = res?.data ?? res; // API wraps array in { retcode, msg, data: [...] }
    if(!Array.isArray(contacts) || !contacts.length) return;
    // Sanitize names: first word only, letters/digits/CJK, max 8 chars
    friendPool = contacts
      .map(c=>({ name:(c.name||'').split(/\s+/)[0].replace(/[^\w\u4e00-\u9fa5]/g,'').slice(0,8), telegram_id:c.telegram_id }))
      .filter(f=>f.name.length>=2);
  }catch(_){}
}

function submitScore(s){
  if(!myId || s<=0) return;
  fetch(`${GAMES_API}/score`,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({ game_id:GAME_ID, telegram_id:myId, name:myName, avatar_url:myAvatar, score:s })
  }).catch(()=>{});
}

async function fetchGlobalLB(){
  const r=await fetch(`${GAMES_API}/leaderboard?game_id=${GAME_ID}&limit=50`);
  return (await r.json()).leaderboard||[];
}

async function fetchFriendsLB(){
  const res = await callAigramAPI(`/note/telegram/user/contact/list?telegram_id=${myId}`);
  const contacts = Array.isArray(res) ? res : (res?.data ?? []);
  const ids=[myId,...contacts.map(c=>c.telegram_id)].join(',');
  const r=await fetch(`${GAMES_API}/leaderboard?game_id=${GAME_ID}&telegram_ids=${ids}`);
  return (await r.json()).leaderboard||[];
}

let lbTab='global';

function switchLbTab(tab){
  lbTab=tab;
  document.getElementById('lb-tab-global').classList.toggle('active',tab==='global');
  document.getElementById('lb-tab-friends').classList.toggle('active',tab==='friends');
  loadLB();
}

function openProfile(telegramId){
  if(!aigram.isInAigram) return;
  try{ window.parent.postMessage(`AW.PROFILE.OPEN-${btoa(JSON.stringify({id:telegramId}))}`, aigram.apiOrigin); }catch(_){}
}

function renderLBRows(entries){
  if(!entries.length){
    document.getElementById('lb-status').textContent=t('lb.empty');
    document.getElementById('lb-list').innerHTML='';
    return;
  }
  document.getElementById('lb-status').textContent='';
  const medals=['🥇','🥈','🥉'];
  document.getElementById('lb-list').innerHTML=entries.map((e,i)=>{
    const isMe=e.telegram_id===myId;
    const rank=i<3?medals[i]:`${i+1}`;
    const init=(e.name||'?')[0].toUpperCase();
    const av=e.avatar_url
      ?`<img src="${e.avatar_url}" alt="" onerror="this.style.display='none'">${init}`
      :init;
    const clickable=aigram.isInAigram?`style="cursor:pointer" onpointerdown="openProfile('${e.telegram_id}')"` :'';
    return `<div class="lb-row${isMe?' lb-me':''}" ${clickable}>
      <div class="lb-rank">${rank}</div>
      <div class="lb-av">${av}</div>
      <div class="lb-name">${e.name||'—'}</div>
      <div class="lb-score">${e.score}</div>
    </div>`;
  }).join('');
}

async function loadLB(){
  const status=document.getElementById('lb-status');
  document.getElementById('lb-list').innerHTML='';
  status.textContent=t('lb.loading');
  try{
    const entries = lbTab==='friends' ? await fetchFriendsLB() : await fetchGlobalLB();
    renderLBRows(entries);
  }catch(_){
    status.textContent=t('lb.empty');
  }
}

function showLeaderboard(){
  document.getElementById('lb-ov').classList.remove('gone');
  // Show tabs only in Aigram context
  document.getElementById('lb-tabs').style.display = aigram.isInAigram ? 'flex' : 'none';
  lbTab='global';
  document.getElementById('lb-tab-global').classList.add('active');
  document.getElementById('lb-tab-friends').classList.remove('active');
  loadLB();
}
function hideLeaderboard(){ document.getElementById('lb-ov').classList.add('gone'); }

// Sentence templates to embed friend names naturally into the passage
const FRIEND_TEMPLATES = [
  n=>`the signal carries ${n} across\n`,
  n=>`through the noise ${n} persists\n`,
  n=>`${n} reaches through context\n`,
  n=>`somewhere in the pattern ${n} remains\n`,
  n=>`the weights remember ${n} now\n`,
];

function buildFriendInjection(){
  if(!friendPool.length){ _injectedPassage=null; _injectedGold=null; return; }
  // Pick up to 8 random friends
  const picked = [...friendPool].sort(()=>Math.random()-0.5).slice(0,8);
  const baseGold = lvCFG().gold;
  const basePassage = lvCFG().passage;
  // Build extra passage lines
  const extraLines = '\n\n' + picked.map((f,i)=>
    FRIEND_TEMPLATES[i % FRIEND_TEMPLATES.length](f.name)
  ).join('');
  _injectedPassage = basePassage + extraLines;
  _injectedGold = [
    ...baseGold,
    ...picked.map(f=>({
      text: f.name,
      type: 'friend',
      group: 0,
      rgb: [210, 130, 10],
      cn: f.name,
      brief: `好友信号 — ${f.name} 出现了！`,
      en_brief: `friend in the signal — ${f.name} detected.`,
    }))
  ];
}

loadUserInfo();
loadFriends();

renderI18n();
resize(); layout();
requestAnimationFrame(loop);
